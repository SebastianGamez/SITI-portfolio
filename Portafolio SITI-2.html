lor:#dde4f0;margin:18px 0 10px;\">Reglas de integridad<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Algunas reglas del negocio relacionadas con los datos:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El stock no puede ser negativo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;No se puede registrar una venta sin un turno activo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El total de la venta debe coincidir con la suma de sus ítems.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El cambio debe ser igual a <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">monto_recibido - total_cop<\u002Fcode>.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Solo puede existir un turno activo por vendedor.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Las ventas cerradas no pueden modificarse.<\u002Fli><\u002Ful>\n        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">8. Módulos funcionales<\u002Fh5>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">8.1 Inicio · Función<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El módulo de inicio constituye el punto de acceso principal al sistema una vez el usuario ha sido autenticado correctamente. Su objetivo es proporcionar una visión general del estado operativo del negocio mediante indicadores resumidos y accesos directos a las funcionalidades principales. Desde este módulo, el usuario puede consultar información relevante para la toma de decisiones y navegar hacia los demás componentes del sistema. Entre las funciones principales se encuentran:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Visualización de métricas generales del negocio.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Consulta del estado del turno activo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Acceso rápido a los módulos de ventas, inventario y turnos.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Presentación de indicadores operativos.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Visualización de información resumida del inventario.<\u002Fli><\u002Ful>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Componentes<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El módulo de inicio está compuesto por los siguientes elementos:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Tarjetas de indicadores (KPIs).<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Panel de métricas.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Menú de navegación principal.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Componentes gráficos.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Resumen del turno activo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Resumen de inventario.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Accesos rápidos a módulos operativos.<\u002Fli><\u002Ful>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">8.2 Ventas · Flujo de registro<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El módulo de ventas permite registrar las transacciones realizadas durante un turno activo. El flujo general de registro es el siguiente:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El usuario accede al módulo de ventas.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El sistema verifica la existencia de un turno activo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El usuario selecciona uno o varios productos.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El sistema consulta la información actualizada del inventario.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El usuario define la cantidad de cada producto.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El sistema calcula automáticamente el subtotal y el total de la venta.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El usuario selecciona el método de pago.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El sistema registra el monto recibido y calcula el cambio correspondiente.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;La información de la venta se almacena en la colección <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">ventas<\u002Fcode>.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Los detalles de la transacción se almacenan en la colección <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">venta_items<\u002Fcode>.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El sistema actualiza los indicadores del turno activo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Se genera una confirmación de la operación.<\u002Fli><\u002Ful>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Actualización del inventario<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Una vez confirmada la venta, el sistema ejecuta automáticamente la actualización del inventario. Para cada producto vendido:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Se consulta el stock disponible.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Se descuenta la cantidad vendida.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Se actualiza el valor del campo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">stock<\u002Fcode>.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Se registran los cambios asociados a la venta.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La actualización del inventario se realiza de forma inmediata para garantizar la consistencia de la información y evitar ventas de productos sin disponibilidad.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">8.3 Inventario · CRUD de productos<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El módulo de inventario permite administrar los productos disponibles para la venta. Las operaciones soportadas son las siguientes:<\u002Fp>        <table style=\"width:100%;max-width:820px;border-collapse:collapse;margin:0 0 18px;\"><thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\"><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Operación<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Descripción<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Crear<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Permite registrar nuevos productos en el sistema.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Consultar<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Permite visualizar el listado de productos registrados.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Actualizar<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Permite modificar la información de productos existentes.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Eliminar<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Permite retirar productos del inventario.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">8.4 Turnos · Apertura y cierre<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El módulo de turnos permite gestionar las jornadas operativas de los vendedores.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Apertura de turno.<\u002Fstrong> Para iniciar un turno, el usuario debe:<\u002Fp>        <ol style=\"font-size:14px;line-height:1.85;color:#94a3b8;padding-left:20px;margin:0 0 14px;max-width:820px;\"><li style=\"margin-bottom:5px;\">Acceder al módulo de turnos.<\u002Fli><li style=\"margin-bottom:5px;\">Verificar que no exista un turno activo asociado al vendedor.<\u002Fli><li style=\"margin-bottom:5px;\">Crear un nuevo registro de turno.<\u002Fli><li style=\"margin-bottom:5px;\">Registrar la fecha y hora de inicio.<\u002Fli><li style=\"margin-bottom:5px;\">Cambiar el estado del turno a activo.<\u002Fli><\u002Fol>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Una vez abierto el turno, el usuario queda habilitado para registrar ventas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre de turno.<\u002Fstrong> Al finalizar la jornada, el usuario debe cerrar el turno activo. Durante este proceso, el sistema:<\u002Fp>        <ol style=\"font-size:14px;line-height:1.85;color:#94a3b8;padding-left:20px;margin:0 0 14px;max-width:820px;\"><li style=\"margin-bottom:5px;\">Calcula el total vendido.<\u002Fli><li style=\"margin-bottom:5px;\">Cuenta el número de ventas realizadas.<\u002Fli><li style=\"margin-bottom:5px;\">Registra la fecha y hora de cierre.<\u002Fli><li style=\"margin-bottom:5px;\">Permite añadir observaciones en el campo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">nota_cierre<\u002Fcode>.<\u002Fli><li style=\"margin-bottom:5px;\">Actualiza el estado del turno a cerrado.<\u002Fli><li style=\"margin-bottom:5px;\">Bloquea el registro de nuevas ventas asociadas al turno.<\u002Fli><\u002Fol>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El historial de turnos permanece disponible para consulta y análisis posteriores.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Interacción entre módulos<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Los módulos funcionales presentan una alta integración entre sí:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El módulo de ventas depende de la existencia de un turno activo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Cada venta impacta directamente en el inventario.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Los indicadores del módulo de inicio se actualizan a partir de la información de ventas y turnos.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El cierre de un turno consolida la información generada durante la jornada operativa.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El inventario proporciona la información necesaria para el registro de ventas.<\u002Fli><\u002Ful>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">9. Qué se puede manipular y cómo<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Esta sección describe los elementos del sistema que pueden ser modificados o extendidos por futuros desarrolladores, indicando su ubicación dentro del proyecto y las consideraciones técnicas asociadas.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">9.1 Archivos modificables<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Los siguientes archivos concentran configuraciones y puntos de entrada del sistema.<\u002Fp>        <table style=\"width:100%;max-width:820px;border-collapse:collapse;margin:0 0 18px;\"><thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\"><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Archivo<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Ubicación<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Propósito<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">App.jsx<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;vertical-align:top;\">src/<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Define la estructura principal de la aplicación.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">main.jsx<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;vertical-align:top;\">src/<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Inicializa React y monta la aplicación.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">vite.config.js<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;vertical-align:top;\">Raíz del proyecto<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Configuración del entorno de construcción.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">.env<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;vertical-align:top;\">Raíz del proyecto<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Variables de entorno y credenciales.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">package.json<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;vertical-align:top;\">Raíz del proyecto<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Dependencias y scripts del proyecto.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">README.md<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;vertical-align:top;\">Raíz del proyecto<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Documentación general del repositorio.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">9.2 Componentes reutilizables.<\u002Fstrong> Los componentes visuales reutilizables se encuentran centralizados en <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">src/components/<\u002Fcode>.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">9.3 Configuraciones editables.<\u002Fstrong> Los parámetros globales del sistema se almacenan en la colección <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">configuracion<\u002Fcode>. Entre las configuraciones editables se encuentran: meta diaria de ventas, parámetros operativos del sistema y valores utilizados en indicadores.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">9.4 Variables de entorno.<\u002Fstrong> Las variables de entorno se definen en el archivo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">.env<\u002Fcode>.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">9.5 Hooks personalizados.<\u002Fstrong> La lógica reutilizable basada en React Hooks se encuentra en <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">src/hooks/<\u002Fcode>. Los hooks permiten encapsular: gestión de estados complejos, acceso a datos, validaciones, suscripciones a Firestore y manejo de autenticación. Al crear un nuevo hook: utilizar el prefijo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">use<\u002Fcode>, evitar dependencias circulares y mantener una única responsabilidad.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">9.6 Servicios.<\u002Fstrong> La comunicación con Firebase y otros servicios externos se centraliza en <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">src/services/<\u002Fcode>. Las responsabilidades de esta capa incluyen: consultas a Cloud Firestore, operaciones CRUD, gestión de autenticación, acceso a Firebase Storage y transformación de datos. Toda interacción con la persistencia debe realizarse exclusivamente desde esta capa. Los componentes visuales no deben realizar consultas directas a la base de datos.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">9.7 Estructura de la base de datos<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Las colecciones principales de Firestore que pueden modificarse o extenderse son:<\u002Fp>        <div style=\"display:flex;flex-wrap:wrap;gap:8px;max-width:620px;margin:0 0 16px;\"><span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#f5a623;\">productos/<\u002Fspan><span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#f5a623;\">vendedores/<\u002Fspan><span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#f5a623;\">turnos/<\u002Fspan><span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#f5a623;\">ventas/<\u002Fspan><span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#f5a623;\">venta_items/<\u002Fspan><span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#f5a623;\">configuracion/<\u002Fspan><\u002Fdiv>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">9.8 Recomendaciones para extensiones futuras<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Para incorporar nuevas funcionalidades se recomienda:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Crear nuevos componentes reutilizables.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Centralizar la lógica de negocio en servicios y hooks.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Evitar duplicar código.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Mantener la nomenclatura existente.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Actualizar la documentación técnica.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Revisar la compatibilidad con el modelo de datos actual.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Toda modificación estructural debe reflejarse en: modelo de datos, módulos funcionales, configuración del entorno, reglas de seguridad y documentación del repositorio.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">10. Seguridad y permisos<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La seguridad del sistema se basa en un modelo de autenticación centralizado mediante Firebase Authentication y en la aplicación de reglas de autorización tanto en la interfaz de usuario como en la capa de persistencia de datos. El objetivo principal es garantizar la confidencialidad, integridad y disponibilidad de la información, limitando el acceso a los recursos según las responsabilidades de cada usuario.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">10.1 Autenticación<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La autenticación de usuarios se implementa mediante Firebase Authentication. El proceso de autenticación está pensado para contemplar las siguientes etapas:<\u002Fp>        <ol style=\"font-size:14px;line-height:1.85;color:#94a3b8;padding-left:20px;margin:0 0 14px;max-width:820px;\"><li style=\"margin-bottom:5px;\">El usuario ingresa sus credenciales de acceso.<\u002Fli><li style=\"margin-bottom:5px;\">Firebase valida la identidad del usuario.<\u002Fli><li style=\"margin-bottom:5px;\">El sistema obtiene el identificador único del usuario autenticado.<\u002Fli><li style=\"margin-bottom:5px;\">Se consultan los datos adicionales del vendedor almacenados en Firestore.<\u002Fli><li style=\"margin-bottom:5px;\">Se asignan los permisos correspondientes según el rol configurado.<\u002Fli><li style=\"margin-bottom:5px;\">Se habilita el acceso a los módulos autorizados.<\u002Fli><\u002Fol>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La sesión del usuario permanece activa hasta que: el usuario cierre sesión manualmente, el token de autenticación expire o se revoquen los permisos asociados.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">10.2 Roles existentes<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Administrador.<\u002Fstrong> Responsable de la gestión operativa del sistema. Permisos principales: gestionar productos; consultar inventario; abrir y cerrar turnos; registrar ventas; consultar métricas operativas; modificar configuraciones globales; y consultar historial de ventas y turnos. Restricciones: no puede modificar registros históricos cerrados; no puede alterar ventas finalizadas; y no puede eliminar información crítica asociada a operaciones históricas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Vendedor.<\u002Fstrong> Responsable del registro de operaciones diarias. Permisos principales: abrir y cerrar su propio turno; registrar ventas; consultar productos disponibles; y consultar información de su turno activo. Restricciones: no puede modificar configuraciones globales; no puede gestionar usuarios; no puede consultar información de otros vendedores; no puede eliminar ventas registradas; y no puede modificar inventario fuera de las operaciones de venta.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">10.3 Restricciones de acceso<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El acceso a los recursos del sistema se controla mediante validaciones en múltiples niveles.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Restricciones funcionales.<\u002Fstrong> Solo los usuarios autenticados pueden acceder al sistema; un vendedor únicamente puede tener un turno activo simultáneamente; no se pueden registrar ventas sin un turno activo; no se pueden registrar ventas con productos sin stock disponible; los registros históricos no pueden modificarse una vez cerrados; y solo los usuarios autorizados pueden modificar configuraciones globales.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Restricciones de datos.<\u002Fstrong> Cada venta debe estar asociada a un vendedor y un turno válidos; el inventario no puede contener valores negativos; el total de la venta debe coincidir con la suma de sus ítems; el cambio debe calcularse automáticamente; y los productos asociados a ventas históricas no deben eliminarse.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">10.4 Reglas de seguridad en Firestore<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La autorización definitiva debe aplicarse en la capa de persistencia mediante reglas de seguridad. Principios generales:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Denegar el acceso por defecto.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Permitir únicamente las operaciones necesarias.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Validar siempre el usuario autenticado.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Restringir el acceso según el rol.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Limitar el acceso a los datos propios del usuario cuando sea necesario.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Toda modificación del modelo de datos o incorporación de nuevas colecciones debe ir acompañada de una revisión de las reglas de seguridad correspondientes.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">10.5 Buenas prácticas de seguridad<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Se recomienda seguir las siguientes prácticas durante el mantenimiento y evolución del sistema:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;No almacenar credenciales en el repositorio.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Utilizar variables de entorno para información sensible.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Mantener actualizadas las dependencias.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Aplicar el principio de mínimo privilegio.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Revisar periódicamente las reglas de seguridad.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Registrar eventos críticos del sistema.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Validar siempre la información recibida desde el cliente.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Realizar pruebas de permisos antes de cada despliegue.<\u002Fli><\u002Ful>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">11. Errores y deuda técnica<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Esta sección documenta las limitaciones conocidas del sistema, los problemas identificados durante el desarrollo y las áreas que requieren mejoras futuras. El objetivo es facilitar las tareas de mantenimiento, priorización técnica y planificación de nuevas iteraciones del proyecto.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">11.1 Errores conocidos<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Dependencia de la conectividad a internet.<\u002Fstrong> <em>Problema:<\u002Fem> El sistema depende completamente de los servicios en la nube de Firebase para la autenticación, persistencia y sincronización de datos. <em>Impacto:<\u002Fem> la aplicación no puede operar sin conexión a internet; las operaciones de lectura y escritura pueden fallar ante una conexión inestable; los usuarios pueden experimentar retrasos en la actualización de la información. <em>Solución temporal:<\u002Fem> verificar la disponibilidad de la conexión antes de ejecutar operaciones críticas; mostrar mensajes claros de error al usuario; implementar mecanismos de reintento para operaciones fallidas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Posibles inconsistencias por actualizaciones concurrentes de inventario.<\u002Fstrong> <em>Problema:<\u002Fem> Múltiples usuarios podrían intentar vender simultáneamente un mismo producto. <em>Impacto:<\u002Fem> riesgo de registrar ventas con stock insuficiente; posibles inconsistencias en los niveles de inventario. <em>Solución temporal:<\u002Fem> validar la disponibilidad del stock antes de confirmar la venta; utilizar transacciones atómicas de Firestore para actualizar inventario y registrar ventas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Manejo limitado de errores en operaciones asíncronas.<\u002Fstrong> <em>Problema:<\u002Fem> Algunas operaciones de lectura y escritura pueden no contar con mecanismos homogéneos de captura y registro de errores. <em>Impacto:<\u002Fem> dificultad para identificar fallos en producción; mensajes de error poco descriptivos para el usuario; mayor complejidad en las tareas de depuración. <em>Solución temporal:<\u002Fem> centralizar el manejo de excepciones en la capa de servicios; implementar registros estructurados de errores.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Escalabilidad limitada de consultas complejas.<\u002Fstrong> <em>Problema:<\u002Fem> Las consultas que involucran múltiples filtros y ordenamientos pueden requerir índices adicionales en Firestore. <em>Impacto:<\u002Fem> incremento en los tiempos de respuesta; errores de ejecución por ausencia de índices compuestos; mayor costo operativo a medida que aumenta el volumen de datos. <em>Solución temporal:<\u002Fem> monitorear las consultas más frecuentes; crear y mantener índices específicos para los casos de uso críticos.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">11.2 Deuda técnica<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ausencia de pruebas automatizadas.<\u002Fstrong> <em>Descripción:<\u002Fem> Actualmente no se cuenta con pruebas unitarias, de integración o de extremo a extremo. <em>Consecuencias:<\u002Fem> mayor riesgo de regresiones; incremento del esfuerzo de validación manual; dificultad para refactorizar el código de forma segura. <em>Acciones recomendadas:<\u002Fem> incorporar pruebas unitarias con herramientas como Vitest; implementar pruebas de componentes; añadir pruebas de integración para los flujos críticos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Gestión global del estado mejorable.<\u002Fstrong> <em>Descripción:<\u002Fem> El crecimiento del número de componentes y funcionalidades puede aumentar la complejidad del manejo del estado compartido. <em>Consecuencias:<\u002Fem> propagación excesiva de propiedades entre componentes; mayor dificultad para rastrear cambios de estado; riesgo de renderizados innecesarios. <em>Acciones recomendadas:<\u002Fem> evaluar la estructura actual de Context API; optimizar la segmentación de contextos; considerar herramientas especializadas de gestión de estado si la complejidad aumenta.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ausencia de monitoreo y observabilidad.<\u002Fstrong> <em>Descripción:<\u002Fem> El sistema no cuenta con mecanismos centralizados para registrar eventos, métricas o errores en producción. <em>Consecuencias:<\u002Fem> dificultad para detectar incidentes; mayor tiempo de diagnóstico; limitada visibilidad del comportamiento del sistema. <em>Acciones recomendadas:<\u002Fem> incorporar herramientas de monitoreo; registrar eventos críticos del negocio; implementar seguimiento de errores en tiempo real.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Documentación técnica dependiente del equipo actual.<\u002Fstrong> <em>Descripción:<\u002Fem> Algunas decisiones arquitectónicas y reglas de negocio aún dependen del conocimiento implícito del equipo de desarrollo. <em>Consecuencias:<\u002Fem> mayor tiempo de incorporación de nuevos desarrolladores; riesgo de pérdida de conocimiento; dificultad para mantener el sistema a largo plazo. <em>Acciones recomendadas:<\u002Fem> mantener actualizado este documento; documentar cambios relevantes en el repositorio; registrar decisiones técnicas importantes.<\u002Fp>\n        <\u002Fdiv>\n        <button class=\"acc-btn\" data-target=\"accManAdmin\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #f5a623;border-radius:6px;padding:16px 18px;cursor:pointer;text-align:left;margin-bottom:12px;\">\n          <span style=\"display:flex;flex-direction:column;gap:3px;\"><span style=\"font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#f5a623;\">Manual del Administrador<\u002Fspan><span style=\"font-size:12px;color:#8892a6;\">Gestión de inventario y administración del negocio<\u002Fspan><\u002Fspan>\n          <span class=\"acc-icon\" style=\"color:#f5a623;font-size:13px;transition:transform .3s;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"accManAdmin\" style=\"display:none;padding:8px 0 24px;border-bottom:1px solid #141c2b;margin-bottom:16px;\">\n        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f5a623;margin:28px 0 14px;\">Introducción<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Este manual está dirigido al administrador del local y explica de manera sencilla qué puede hacer dentro del sistema, especialmente en la sección de inventario. Aquí se muestra cómo ingresar al perfil de administrador, ubicar la opción de inventario y realizar los cambios permitidos sobre los productos registrados. El objetivo de este documento es ayudarle a entender de forma rápida qué información puede revisar, modificar, agregar o eliminar, sin necesidad de conocimientos técnicos. También se aclara qué acciones no están disponibles para este perfil y en qué casos pueden existir excepciones.<\u002Fp>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:14px 18px;margin:0 0 24px;max-width:520px;\"><div style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#526077;margin-bottom:8px;\">Índice<\u002Fdiv><div style=\"font-size:13px;color:#94a3b8;line-height:1.9;\">1. Introducción<br>2. Acceso al sistema<br>3. Qué encuentra<br>4. Qué puede manipular y cómo<br>5. Qué no puede y por qué<br>6. Buenas prácticas<br>7. Preguntas frecuentes<br>8. Excepciones<\u002Fdiv><\u002Fdiv>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f5a623;margin:28px 0 14px;\">Acceso al sistema<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Seleccione el perfil de administrador.<\u002Fstrong> Ubique la tarjeta o botón correspondiente al perfil de administrador y presiónelo para ingresar. Este perfil cuenta con permisos ampliados que permiten consultar información operativa y gestionar el inventario del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Espere a que el sistema cargue la información.<\u002Fstrong> Una vez seleccionado el perfil, la aplicación mostrará las secciones habilitadas para la administración del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique que ha ingresado con el perfil correcto.<\u002Fstrong> Antes de realizar cualquier modificación, confirme que tiene acceso a las secciones Inicio, Ventas, Inventario y Turnos. La disponibilidad de estas opciones indica que ha iniciado sesión con los permisos adecuados.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Compruebe que la información mostrada corresponde al estado actual del negocio.<\u002Fstrong> Revise brevemente los indicadores principales y asegúrese de que los datos visibles estén actualizados antes de realizar cambios en el inventario o consultar reportes.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Utilice el perfil de administrador de forma responsable.<\u002Fstrong> Las acciones realizadas desde este perfil pueden afectar la información operativa del negocio, por lo que se recomienda no compartir el acceso con personas no autorizadas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Evite realizar modificaciones simultáneas desde varios dispositivos.<\u002Fstrong> Si más de una persona administra el inventario al mismo tiempo, podrían generarse inconsistencias en la información mostrada.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre la sesión al finalizar las tareas administrativas.<\u002Fstrong> Una vez haya terminado de consultar información o realizar cambios, presione el botón Cerrar sesión, ubicado en la parte superior de la pantalla principal.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique que el cierre de sesión se haya realizado correctamente.<\u002Fstrong> Después de cerrar la sesión, el sistema regresará a la pantalla de selección de perfiles. Esto garantiza que ninguna persona pueda acceder a la información administrativa desde el dispositivo sin autorización.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Tenga en cuenta las futuras actualizaciones del sistema.<\u002Fstrong> Actualmente, el acceso se realiza mediante la selección del perfil de usuario. Sin embargo, en futuras versiones podrán incorporarse mecanismos adicionales de autenticación, como contraseñas o métodos de verificación personalizados, con el fin de reforzar la seguridad del sistema.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f5a623;margin:28px 0 14px;\">Qué encuentra<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ingrese al sistema utilizando el perfil de administrador.<\u002Fstrong> Una vez dentro de la plataforma, encontrará un menú principal que le permitirá acceder a las diferentes áreas de gestión del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ubique las secciones principales del sistema.<\u002Fstrong> El menú de navegación está compuesto por las opciones Inicio, Ventas, Inventario y Turnos. Cada una de ellas cumple una función específica dentro de la operación diaria.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Consulte la sección Inicio para obtener una vista general del negocio.<\u002Fstrong> En esta pantalla encontrará un resumen de la información más relevante del sistema. Su objetivo es ofrecer una visión rápida del estado actual de la operación y facilitar el acceso a las funciones principales.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Acceda a la sección Ventas para analizar el comportamiento comercial.<\u002Fstrong> Aquí encontrará información organizada mediante gráficos e indicadores que le ayudarán a comprender el desempeño del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise los indicadores disponibles en la sección Ventas.<\u002Fstrong> Podrá consultar datos relacionados con:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.9;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Ventas realizadas durante el día.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Productos con mayor rotación.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Horas de mayor actividad.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Métodos de pago más utilizados.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Cumplimiento de metas e indicadores operativos.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Esta información le permitirá identificar tendencias, detectar oportunidades de mejora y apoyar la toma de decisiones.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Diríjase a la sección Inventario para gestionar los productos del negocio.<\u002Fstrong> Este es el módulo principal para el perfil de administrador y el espacio donde realizará la mayoría de sus tareas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise la información disponible para cada producto.<\u002Fstrong> Dentro del inventario encontrará el listado completo de productos registrados, junto con información como:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.9;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Nombre del producto.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Categoría.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Precio de venta.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Cantidad disponible.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;Estado del inventario.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Utilice las herramientas de gestión del inventario.<\u002Fstrong> Desde esta sección podrá crear nuevos productos, modificar la información de los existentes o eliminarlos cuando sea necesario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Consulte la sección Turnos para realizar seguimiento a la operación diaria.<\u002Fstrong> En este apartado podrá revisar la información relacionada con las jornadas de trabajo registradas en el sistema, facilitando el control y la supervisión de la actividad del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Familiarícese con los botones e iconos más utilizados.<\u002Fstrong> A lo largo de la plataforma encontrará botones e iconos que le permitirán realizar acciones rápidas, como editar información, agregar nuevos registros, eliminar productos o cerrar la sesión.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que cada sección está diseñada para simplificar la administración del negocio.<\u002Fstrong> La interfaz organiza la información de forma clara y accesible, permitiéndole consultar datos relevantes y realizar cambios sin necesidad de conocimientos técnicos avanzados.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f5a623;margin:28px 0 14px;\">Qué puede manipular y cómo<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ingrese al sistema con el perfil de administrador.<\u002Fstrong> Una vez dentro de la plataforma, seleccione la opción Inventario, identificada con el ícono de una caja en el menú principal.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise el listado de productos disponibles.<\u002Fstrong> En esta sección encontrará las tarjetas o registros correspondientes a cada producto del negocio. Cada una muestra información básica como el nombre del producto, el precio y la cantidad disponible.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Identifique las acciones disponibles para cada producto.<\u002Fstrong> En cada tarjeta encontrará botones que le permitirán realizar diferentes operaciones sobre el inventario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Edite la información de un producto cuando sea necesario.<\u002Fstrong> Para modificar un producto existente, presione el botón de edición identificado con el ícono amarillo ubicado en la tarjeta del producto correspondiente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique la información del producto seleccionado.<\u002Fstrong> Al presionar el botón de edición, el sistema abrirá una nueva pantalla o ventana con los datos actuales del producto.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Actualice los campos necesarios.<\u002Fstrong> Dentro del formulario podrá modificar la información disponible, como el nombre del producto, la categoría asignada, el precio de venta y la cantidad disponible en inventario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Guarde los cambios realizados.<\u002Fstrong> Después de actualizar la información, presione el botón correspondiente para guardar los cambios. El sistema confirmará que la modificación se realizó correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Elimine productos que ya no formen parte del inventario.<\u002Fstrong> Si necesita retirar un producto del sistema, acceda primero a la pantalla de edición del producto y seleccione la opción Eliminar producto.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Confirme la eliminación antes de continuar.<\u002Fstrong> Antes de completar la acción, revise cuidadosamente que se trata del producto correcto. Una vez eliminado, el producto dejará de aparecer en el inventario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Agregue nuevos productos cuando sea necesario.<\u002Fstrong> Para registrar un nuevo producto, presione el botón verde Añadir producto, ubicado en la sección de inventario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Complete la información solicitada.<\u002Fstrong> El sistema abrirá un formulario donde deberá diligenciar todos los campos requeridos para crear el nuevo producto.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique los datos antes de guardar.<\u002Fstrong> Revise que la información ingresada sea correcta y esté completa. Esto ayudará a mantener un inventario organizado y evitará errores durante el proceso de venta.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Confirme la creación del producto.<\u002Fstrong> Una vez completado el formulario, guarde la información. El nuevo producto aparecerá automáticamente en el listado del inventario y estará disponible para su uso.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Compruebe que las modificaciones se hayan aplicado correctamente.<\u002Fstrong> Después de crear, editar o eliminar un producto, revise el inventario para confirmar que los cambios realizados se reflejan correctamente en el sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que todas las modificaciones afectan la operación del negocio.<\u002Fstrong> Mantenga la información del inventario actualizada y verifique cuidadosamente cada cambio antes de guardarlo, ya que estos datos son utilizados en el registro de ventas y la generación de reportes.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#ef4444;margin:28px 0 14px;\">Qué no puede y por qué<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No utilice el perfil de administrador para compartir el acceso con otras personas.<\u002Fstrong> Este perfil cuenta con permisos que permiten modificar información importante del negocio. Compartir el acceso dificulta la identificación de quién realizó cada cambio y puede generar errores en la administración del sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No cree productos con información incompleta.<\u002Fstrong> El sistema no permitirá guardar registros que no cuenten con los datos obligatorios. Mantener la información completa garantiza un mejor control del inventario y evita inconvenientes durante el proceso de venta.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No registre productos duplicados.<\u002Fstrong> Antes de crear un nuevo producto, verifique que este no exista previamente en el inventario. Los registros duplicados pueden generar inconsistencias en las existencias, afectar los reportes y dificultar el seguimiento de las ventas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No utilice nombres ambiguos o poco descriptivos.<\u002Fstrong> Los productos deben registrarse con nombres claros y fáciles de identificar. Esto facilita la búsqueda dentro del sistema y reduce errores al momento de realizar una venta.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No asigne categorías inexistentes o no autorizadas.<\u002Fstrong> Las categorías disponibles han sido definidas para mantener el inventario organizado. Crear o utilizar categorías no estandarizadas dificulta la consulta de información y afecta la generación de reportes.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No modifique el inventario durante procesos de verificación física.<\u002Fstrong> Si se está realizando un conteo manual o una auditoría del inventario, evite crear, editar o eliminar productos hasta finalizar la revisión. Esto ayuda a garantizar que la información registrada sea consistente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No elimine productos asociados a ventas registradas.<\u002Fstrong> Algunos productos pueden estar vinculados al historial de ventas del sistema. En estos casos, la eliminación puede estar restringida para preservar la integridad de la información y mantener la trazabilidad de las operaciones.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No modifique registros históricos de ventas.<\u002Fstrong> La información relacionada con ventas realizadas forma parte del historial operativo del negocio y no debe alterarse desde el módulo de inventario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No realice modificaciones simultáneas desde varios dispositivos.<\u002Fstrong> Editar el mismo producto desde diferentes equipos al mismo tiempo puede generar conflictos en la información y provocar que algunos cambios no se guarden correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No cierre la aplicación mientras se guarda información.<\u002Fstrong> Espere siempre la confirmación del sistema antes de salir o cambiar de pantalla. Interrumpir el proceso puede ocasionar que los cambios no se registren correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No ignore las alertas y mensajes del sistema.<\u002Fstrong> Las notificaciones están diseñadas para prevenir errores y proteger la información del negocio. Lea cuidadosamente cada mensaje antes de continuar con una acción.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No intente modificar configuraciones restringidas.<\u002Fstrong> Algunas funciones internas del sistema, como la gestión avanzada de permisos, las configuraciones técnicas o la información histórica, pueden estar limitadas para proteger la estabilidad y seguridad de la plataforma.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que estas restricciones existen para proteger la información del negocio.<\u002Fstrong> Mantener la integridad del inventario y la confiabilidad de los datos permite que los reportes, indicadores y procesos operativos funcionen correctamente.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2dd4bf;margin:28px 0 14px;\">Buenas prácticas<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise el inventario al inicio y al final de cada jornada.<\u002Fstrong> Verifique que la información registrada en el sistema coincida con la disponibilidad real de los productos. Esto le permitirá detectar diferencias a tiempo y tomar las medidas necesarias.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Mantenga actualizada la información de los productos.<\u002Fstrong> Cada vez que cambie el precio, la disponibilidad o cualquier característica importante de un producto, actualice la información en el sistema lo antes posible.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Utilice nombres claros y consistentes para los productos.<\u002Fstrong> Registre los productos utilizando nombres fáciles de identificar y mantenga un formato uniforme en todo el inventario. Esto facilitará las búsquedas y reducirá la posibilidad de duplicados.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique la información antes de guardar cambios.<\u002Fstrong> Antes de crear, editar o eliminar un producto, revise cuidadosamente los datos ingresados para asegurarse de que son correctos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Evite eliminar productos con frecuencia.<\u002Fstrong> Si un producto dejará de venderse temporalmente, considere mantener el registro en el sistema en lugar de eliminarlo. Esto facilitará futuras consultas y conservará la trazabilidad de la información.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Realice cambios importantes en momentos de baja actividad.<\u002Fstrong> Siempre que sea posible, evite modificar el inventario durante horas de alta demanda. Esto reduce el riesgo de inconsistencias mientras se registran ventas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise periódicamente los indicadores de ventas.<\u002Fstrong> Consulte los gráficos y reportes disponibles para identificar los productos más vendidos, las horas de mayor actividad y las tendencias del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Utilice la información del sistema para tomar decisiones.<\u002Fstrong> Analice los datos disponibles antes de realizar ajustes en el inventario, definir promociones o planificar nuevas compras.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Compruebe que los cambios se hayan guardado correctamente.<\u002Fstrong> Después de realizar una modificación, confirme que la información actualizada aparece correctamente en el sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Mantenga una conexión estable a internet durante la administración del inventario.<\u002Fstrong> Una conexión inestable puede impedir que los cambios se registren correctamente o provocar inconsistencias en la información.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre la sesión al finalizar las tareas administrativas.<\u002Fstrong> Una vez terminadas las actividades, cierre la sesión para proteger la información del negocio y evitar accesos no autorizados.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Reporte cualquier comportamiento inusual del sistema.<\u002Fstrong> Si detecta errores, información incorrecta o mensajes inesperados, comuníquese con el responsable técnico antes de realizar cambios adicionales.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que la calidad de la información depende de su actualización constante.<\u002Fstrong> Mantener el inventario organizado y actualizado permitirá que las ventas, los reportes y los indicadores reflejen con precisión el estado real del negocio.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Preguntas frecuentes<\u002Fh5>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si un producto no aparece en el inventario?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Antes de crear un nuevo producto, utilice la función de búsqueda y verifique que no se encuentre registrado con un nombre similar o dentro de otra categoría. Si el producto no existe, puede crearlo utilizando la opción Añadir producto y completando la información solicitada.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si un producto aparece duplicado?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Revise cuidadosamente la información de ambos registros y confirme cuál contiene los datos correctos. Si uno de los productos no ha sido utilizado en ventas, elimine el registro duplicado. Si ambos productos presentan movimientos asociados, comuníquese con el responsable técnico antes de realizar cualquier modificación.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si el inventario no coincide con la cantidad real de productos?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Verifique nuevamente las existencias físicas y compare la información con los registros del sistema. Si identifica diferencias, revise el historial de ventas y confirme que todas las operaciones hayan sido registradas correctamente. Una vez validada la información, actualice las cantidades del inventario según corresponda.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si un cambio no se guarda?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Compruebe que todos los campos obligatorios estén completos y que la información ingresada sea válida. Verifique también que la conexión a internet sea estable y vuelva a intentarlo. Si el problema persiste, cierre la sesión, vuelva a ingresar y comuníquese con el responsable técnico.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si eliminé un producto por error?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Revise si el sistema permite recuperar el producto eliminado. Si no existe una opción de restauración, cree nuevamente el producto ingresando la información correspondiente. En caso de que el producto tenga ventas asociadas o la información histórica sea importante, contacte al responsable técnico para evaluar la mejor solución.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si no puedo acceder al inventario?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Verifique que haya iniciado sesión con el perfil de administrador. Si el problema continúa, cierre la sesión y vuelva a ingresar al sistema. Si la sección de inventario sigue sin aparecer o no puede realizar cambios, comuníquese con el responsable técnico para revisar los permisos de acceso.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si aparece un mensaje de error al crear o editar un producto?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Lea cuidadosamente la información mostrada en pantalla y verifique los campos resaltados. Asegúrese de completar todos los datos obligatorios y de utilizar valores válidos para cada campo. Si el mensaje continúa apareciendo después de varios intentos, tome nota del error y comuníquese con el responsable técnico.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si el sistema no responde?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Espere unos segundos antes de realizar una nueva acción y confirme que el dispositivo tenga conexión a internet. Evite presionar varias veces el mismo botón, ya que esto puede generar operaciones duplicadas o inconsistencias en la información. Si el problema persiste, cierre la sesión y vuelva a ingresar al sistema.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si otra persona utilizó el perfil de administrador?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Cambie inmediatamente de usuario cerrando la sesión actual y vuelva a ingresar con el perfil correcto. Revise las modificaciones recientes realizadas en el inventario y verifique que la información siga siendo correcta. Para evitar este tipo de situaciones, cierre siempre la sesión al finalizar las tareas administrativas y no comparta el acceso con personas no autorizadas.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si observo información incorrecta en los gráficos o reportes?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Compruebe que el inventario y las ventas registradas estén actualizados. Recuerde que los indicadores dependen de la información almacenada en el sistema, por lo que cualquier error en los registros puede afectar los resultados mostrados. Si la información continúa siendo inconsistente después de verificar los datos, comuníquese con el responsable técnico.<\u002Fp><\u002Fdiv>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f59e0b;margin:28px 0 14px;\">Excepciones<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Aunque el sistema ha sido diseñado para facilitar la gestión del negocio, es posible que en algunas situaciones determinadas acciones no estén disponibles o requieran atención adicional.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Considere que ciertos campos son obligatorios.<\u002Fstrong> Al crear o editar un producto, el sistema no permitirá guardar los cambios si faltan datos esenciales o si la información ingresada no cumple con los formatos requeridos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique su conexión a internet antes de realizar cambios importantes.<\u002Fstrong> Si la conexión es inestable o se interrumpe durante una operación, es posible que los cambios no se guarden correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Confirme siempre que la información se haya actualizado.<\u002Fstrong> Después de crear, editar o eliminar un producto, revise el inventario para asegurarse de que los cambios se reflejan correctamente en el sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que algunas funciones pueden cambiar con el tiempo.<\u002Fstrong> El sistema se encuentra en constante evolución, por lo que ciertas opciones, nombres de botones o ubicaciones dentro de la interfaz podrían modificarse en futuras actualizaciones.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Tenga en cuenta que algunas configuraciones pueden estar restringidas.<\u002Fstrong> Aunque el perfil de administrador cuenta con permisos ampliados, ciertas funciones internas o configuraciones avanzadas pueden estar limitadas para proteger la estabilidad y seguridad del sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Evite realizar modificaciones simultáneas desde varios dispositivos.<\u002Fstrong> Si varias personas intentan editar el mismo producto al mismo tiempo, podrían producirse inconsistencias o conflictos en la información almacenada.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Considere que algunos cambios pueden tardar unos segundos en reflejarse.<\u002Fstrong> Dependiendo de la conexión o del dispositivo utilizado, es posible que la actualización de la información no sea inmediata. Espere la confirmación del sistema antes de repetir una acción.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No cierre la aplicación mientras se procesa una operación.<\u002Fstrong> Interrumpir el proceso de guardado o actualización puede ocasionar la pérdida parcial de la información ingresada.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Reporte cualquier comportamiento inesperado.<\u002Fstrong> Si observa mensajes de error recurrentes, información incorrecta o funciones que no operan como deberían, evite realizar múltiples intentos consecutivos y comuníquese con el responsable técnico del sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que estas excepciones buscan proteger la información del negocio.<\u002Fstrong> Las restricciones y validaciones implementadas tienen como objetivo garantizar la confiabilidad de los datos, facilitar la operación diaria y mantener el correcto funcionamiento de la plataforma.<\u002Fp>\n        <\u002Fdiv>\n\n        <button class=\"acc-btn\" data-target=\"accManUser\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #a78bfa;border-radius:6px;padding:16px 18px;cursor:pointer;text-align:left;margin-bottom:12px;\">\n          <span style=\"display:flex;flex-direction:column;gap:3px;\"><span style=\"font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#a78bfa;\">Manual del Usuario<\u002Fspan><span style=\"font-size:12px;color:#8892a6;\">Registro de ventas y gestión de turnos · usuarios operativos<\u002Fspan><\u002Fspan>\n          <span class=\"acc-icon\" style=\"color:#a78bfa;font-size:13px;transition:transform .3s;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"accManUser\" style=\"display:none;padding:8px 0 24px;\">\n        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Introducción<\u002Fh5>        <p st
