yle=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Este manual está dirigido a los usuarios operativos del sistema, es decir, a las personas encargadas de realizar las actividades diarias del negocio, como el registro de ventas y la gestión de turnos. Su propósito es explicar, de manera sencilla y práctica, cómo utilizar las diferentes funciones disponibles dentro de la plataforma. A lo largo de este documento se describen las acciones que el usuario puede realizar, los pasos necesarios para completar cada proceso y las recomendaciones para evitar errores comunes durante el uso del sistema. No es necesario contar con conocimientos técnicos para utilizar esta guía.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El sistema ha sido diseñado para agilizar las tareas diarias del negocio, reducir los tiempos de atención al cliente y facilitar el registro de la información. Por ello, la interfaz prioriza la simplicidad y la rapidez, permitiendo que los usuarios puedan completar sus actividades de forma intuitiva y eficiente. Este manual servirá como material de apoyo para el aprendizaje, consulta y uso continuo de la plataforma, garantizando que las operaciones diarias se realicen de manera correcta y consistente.<\u002Fp>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:14px 18px;margin:0 0 24px;max-width:520px;\"><div style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#526077;margin-bottom:8px;\">Índice<\u002Fdiv><div style=\"font-size:13px;color:#94a3b8;line-height:1.9;\">1. Introducción<br>2. Acceso al sistema<br>3. Conociendo la interfaz<br>4. Registro de ventas<br>5. Cierre de jornada<br>6. Mensajes y alertas del sistema<br>7. Buenas prácticas de uso<br>8. Preguntas frecuentes<\u002Fdiv><\u002Fdiv>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Acceso al sistema<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Abra la aplicación desde el dispositivo asignado por el negocio.<\u002Fstrong> Al iniciar la aplicación, se mostrará la pantalla principal de acceso, donde encontrará los perfiles de usuario disponibles dentro del sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Seleccione su perfil de usuario.<\u002Fstrong> Ubique la tarjeta o botón que corresponda a su nombre o identificación y presione para ingresar. Cada perfil cuenta con permisos específicos según las funciones que desempeña dentro del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Espere a que el sistema cargue la información correspondiente.<\u002Fstrong> Una vez seleccionado el perfil, el sistema abrirá automáticamente la interfaz con las opciones habilitadas para ese usuario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique que haya ingresado con el perfil correcto.<\u002Fstrong> Antes de comenzar sus actividades, confirme que el nombre y las opciones disponibles coincidan con las funciones que debe realizar durante la jornada.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Utilice únicamente su propio perfil.<\u002Fstrong> Todas las acciones realizadas dentro del sistema quedan asociadas al usuario seleccionado. Por esta razón, no debe utilizar el perfil de otra persona ni permitir que otros usuarios operen desde el suyo.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Mantenga la sesión activa solo mientras utiliza la aplicación.<\u002Fstrong> Si necesita alejarse del dispositivo o ha finalizado sus actividades, cierre la sesión para evitar accesos no autorizados.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre la sesión al finalizar la jornada.<\u002Fstrong> Para salir del sistema, presione el botón Cerrar sesión, ubicado en la parte superior de la pantalla principal.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Conociendo la interfaz<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Al ingresar al sistema, observe la pantalla principal con calma.<\u002Fstrong> Allí verá el espacio de trabajo donde se muestran las opciones disponibles según su perfil. La interfaz está organizada para que pueda moverse entre las secciones principales sin necesidad de conocimientos técnicos, por lo que los elementos más importantes se encuentran visibles y separados de forma clara.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Identifique el menú principal.<\u002Fstrong> En este menú encontrará las secciones más usadas del sistema. Normalmente están distribuidas de manera ordenada para que pueda pasar de una parte a otra con facilidad. Las opciones principales que verá en la aplicación son Inicio y Turnos, aunque algunas pueden aparecer habilitadas o restringidas según el tipo de usuario que haya iniciado sesión.<\u002Fp>        <ul style=\"font-size:14px;line-height:1.9;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;<strong style=\"color:#dde4f0;\">Inicio:<\u002Fstrong> le muestra una vista general del sistema y de la actividad actual.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:6px;\">•&nbsp;&nbsp;<strong style=\"color:#dde4f0;\">Turnos:<\u002Fstrong> le permite revisar la información de las jornadas o sesiones de trabajo.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise la sección de inicio como punto de orientación.<\u002Fstrong> Esta pantalla funciona como una referencia rápida para saber en qué parte del sistema se encuentra. Desde allí puede ubicar las demás secciones y reconocer los accesos principales. Es útil para comenzar la jornada y entender el estado general de la aplicación.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise la sección de turnos para llevar control de la jornada.<\u002Fstrong> En esta parte se muestra la información relacionada con el tiempo de trabajo y el control de sesiones o jornadas activas. Esto ayuda a mantener un seguimiento ordenado de la actividad diaria y facilita saber en qué estado se encuentra el turno actual.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Aprenda a reconocer los iconos más utilizados.<\u002Fstrong> La aplicación usa iconos para hacer más rápida la navegación y evitar textos largos en cada botón. Entre los más comunes encontrará el icono de casa, que lleva a la pantalla principal; el icono de salida o cierre, que sirve para terminar la sesión. Estos iconos están pensados para que la interfaz sea más clara y fácil de usar.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Reconozca los botones de acción.<\u002Fstrong> Algunos botones cumplen funciones muy específicas dentro de la aplicación. Los más importantes son los que permiten entrar a una sección, guardar cambios, editar información, eliminar registros y cerrar sesión. Por lo general, los botones de acción principal están resaltados con colores o ubicaciones visibles para que sean fáciles de identificar.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Fíjese en los botones de edición y eliminación cuando trabaje con registros.<\u002Fstrong> En varias pantallas encontrará un botón para modificar información existente y otro para borrar elementos cuando sea necesario. Estos botones suelen estar ubicados junto a cada registro o tarjeta de información. Su función es facilitar la administración rápida de datos sin tener que abrir demasiadas pantallas adicionales.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Use los indicadores visuales como apoyo.<\u002Fstrong> En algunos casos el sistema mostrará colores, tarjetas, mensajes o pequeños indicadores para avisarle si algo está correcto, si requiere atención o si una acción fue realizada con éxito. Estos elementos sirven para que usted sepa qué está pasando dentro del sistema sin necesidad de revisar detalles técnicos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que la interfaz está pensada para ser sencilla.<\u002Fstrong> El orden de los menús, los iconos y los botones busca que usted pueda aprender a usar la aplicación rápidamente. Si en algún momento necesita volver al punto de partida, basta con regresar a Inicio o cerrar la sesión para comenzar de nuevo desde la pantalla principal.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Registro de ventas<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ingrese a la sección de ventas desde el menú principal.<\u002Fstrong> Una vez dentro del sistema, seleccione la opción Inicio para acceder a las herramientas relacionadas con el registro y seguimiento de las operaciones realizadas durante la jornada.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Inicie una nueva venta.<\u002Fstrong> Presione el botón Nueva venta para abrir el formulario de registro. El sistema mostrará una pantalla diseñada para completar la operación de forma rápida y sencilla.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Seleccione los productos que desea registrar.<\u002Fstrong> Busque el producto correspondiente dentro del listado disponible y agréguelo a la venta. Si es necesario, ajuste la cantidad de unidades que el cliente desea comprar.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique la información antes de continuar.<\u002Fstrong> Revise cuidadosamente que los productos seleccionados y las cantidades registradas coincidan con la compra realizada por el cliente. El sistema actualizará automáticamente el valor total de la venta.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Seleccione el método de pago utilizado.<\u002Fstrong> Indique la forma de pago elegida por el cliente, como efectivo, transferencia o cualquier otro método habilitado dentro del sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Confirme la venta.<\u002Fstrong> Una vez verificada toda la información, presione el botón para registrar la operación. El sistema guardará automáticamente la venta y actualizará el inventario según los productos vendidos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Espere la confirmación del sistema.<\u002Fstrong> Cuando la operación se complete correctamente, aparecerá un mensaje indicando que la venta ha sido registrada con éxito.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Corrija errores de inmediato si es necesario.<\u002Fstrong> Si detecta un error justo después de registrar la venta, utilice la opción de anulación o deshacer disponible en el sistema. Esta función le permitirá revertir la operación dentro del tiempo establecido, devolviendo las unidades al inventario y dejando constancia del cambio realizado.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Consulte el historial de ventas cuando necesite verificar una operación.<\u002Fstrong> Desde la misma sección podrá revisar las ventas registradas durante la jornada para confirmar información, resolver dudas o identificar posibles errores.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Mantenga el registro actualizado.<\u002Fstrong> Para garantizar que la información del sistema sea confiable, registre cada venta en el momento en que se realiza y evite acumular operaciones para ingresarlas más tarde.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Cierre de jornada<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique que todas las ventas del día hayan sido registradas.<\u002Fstrong> Antes de finalizar la jornada, asegúrese de que todas las ventas realizadas se encuentren registradas correctamente en el sistema. Para ello, consulte el historial de ventas y confirme que no existan operaciones pendientes o errores evidentes.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise las ventas anuladas o corregidas.<\u002Fstrong> Si durante el día fue necesario cancelar o modificar alguna venta, verifique que estos cambios aparezcan correctamente reflejados en el historial. Esto le permitirá mantener un control adecuado de las operaciones realizadas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Realice la validación de caja.<\u002Fstrong> Compare el dinero disponible en caja con la información registrada en el sistema. Verifique que los valores coincidan y confirme que todos los métodos de pago utilizados durante el día hayan sido registrados correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Ingrese a la sección de turnos.<\u002Fstrong> Una vez finalizadas las verificaciones anteriores, acceda al menú Turnos para consultar la información de la jornada activa.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise la información del turno actual.<\u002Fstrong> Confirme que los datos mostrados correspondan a su jornada de trabajo y verifique que el tiempo registrado sea correcto.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre el turno cuando haya terminado sus actividades.<\u002Fstrong> Presione la opción Cerrar turno para finalizar oficialmente la jornada en el sistema. Esta acción dejará registro del horario trabajado y permitirá mantener un control adecuado de la operación diaria.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Espere la confirmación del sistema.<\u002Fstrong> Una vez completado el cierre, aparecerá un mensaje indicando que el turno ha finalizado correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre la sesión antes de retirarse.<\u002Fstrong> Para proteger la información del negocio y evitar que otras personas utilicen su perfil, seleccione la opción Cerrar sesión al finalizar la jornada.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique que el sistema haya regresado a la pantalla principal.<\u002Fstrong> Después de cerrar la sesión, asegúrese de que la aplicación haya vuelto a la pantalla de selección de perfiles. Esto confirma que su cuenta ya no se encuentra activa en el dispositivo.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Mensajes y alertas del sistema<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Preste atención a los mensajes que aparecen en pantalla.<\u002Fstrong> Durante el uso del sistema, se mostrarán mensajes y alertas para informarle sobre el resultado de las acciones realizadas, advertirle sobre posibles errores o solicitar una confirmación antes de ejecutar una operación importante.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Identifique los mensajes de confirmación.<\u002Fstrong> Estos mensajes aparecen cuando una acción se ha realizado correctamente. Por ejemplo, después de registrar una venta, actualizar un producto o cerrar un turno, el sistema mostrará una notificación indicando que la operación se completó con éxito.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Lea cuidadosamente las advertencias antes de continuar.<\u002Fstrong> Algunas acciones pueden requerir una confirmación adicional, especialmente aquellas que no pueden revertirse fácilmente, como eliminar un producto o cancelar una venta. Antes de aceptar, revise la información mostrada y asegúrese de que desea continuar.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise los mensajes de error con atención.<\u002Fstrong> Si el sistema detecta información incompleta o inconsistente, mostrará una alerta indicando qué debe corregirse antes de continuar. Estos mensajes utilizan un lenguaje sencillo para ayudarle a identificar el problema rápidamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Corrija los campos resaltados.<\u002Fstrong> Cuando un formulario presente errores, los campos que requieren atención se marcarán visualmente. Verifique la información ingresada y realice las correcciones necesarias antes de intentar guardar nuevamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Tenga en cuenta las alertas relacionadas con el inventario.<\u002Fstrong> El sistema puede mostrar avisos cuando un producto tenga existencias bajas o cuando la cantidad solicitada en una venta supere el inventario disponible. En estos casos, revise la disponibilidad del producto antes de continuar.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique su conexión si ocurre un problema inesperado.<\u002Fstrong> Si aparece un mensaje indicando que no fue posible completar una operación, compruebe que el dispositivo tenga una conexión estable a internet y vuelva a intentarlo.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">No repita una misma acción varias veces seguidas.<\u002Fstrong> Si el sistema tarda unos segundos en responder, espere a que aparezca un mensaje de confirmación antes de presionar nuevamente el botón. Esto evitará registros duplicados o acciones no deseadas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Solicite apoyo si el mensaje persiste.<\u002Fstrong> Si una alerta o mensaje de error continúa apareciendo después de verificar la información ingresada, comuníquese con el administrador del sistema o con la persona responsable del soporte técnico.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Recuerde que los mensajes del sistema están diseñados para ayudarle.<\u002Fstrong> Lea siempre las notificaciones antes de cerrarlas. Estas alertas le permitirán utilizar la aplicación de forma más segura, evitar errores y mantener la información del negocio actualizada y confiable.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2dd4bf;margin:28px 0 14px;\">Buenas prácticas de uso<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Registre cada venta en el momento en que se realiza.<\u002Fstrong> Evite acumular varias ventas para ingresarlas más tarde. Registrar las operaciones en tiempo real reduce los errores, mantiene actualizado el inventario y garantiza que la información refleje correctamente la actividad del negocio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Verifique la información antes de confirmar una operación.<\u002Fstrong> Antes de guardar una venta, revise cuidadosamente los productos seleccionados, las cantidades y el método de pago registrado. Una revisión rápida puede evitar correcciones posteriores.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Utilice siempre su propio perfil de usuario.<\u002Fstrong> Cada usuario debe trabajar únicamente desde el perfil que le ha sido asignado. Esto permite mantener un registro claro de las operaciones realizadas y facilita el seguimiento de la actividad dentro del sistema.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Consulte la disponibilidad de los productos antes de ofrecerlos.<\u002Fstrong> Revise periódicamente la sección de inventario para conocer las existencias disponibles y evitar registrar ventas de productos agotados.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Preste atención a las alertas y mensajes del sistema.<\u002Fstrong> Lea cuidadosamente las notificaciones antes de cerrarlas. Los mensajes de confirmación, advertencia o error le ayudarán a realizar sus tareas de forma correcta y segura.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Evite realizar la misma acción varias veces seguidas.<\u002Fstrong> Después de presionar un botón para guardar información, espere la confirmación del sistema antes de intentarlo nuevamente. Esto ayudará a prevenir registros duplicados.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Mantenga el dispositivo conectado a internet.<\u002Fstrong> Verifique que la conexión sea estable durante toda la jornada. Una interrupción en la red puede impedir que las operaciones se registren correctamente.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Revise periódicamente el historial de ventas.<\u002Fstrong> Consultar las ventas registradas durante el día le permitirá detectar errores a tiempo y asegurar que la información almacenada sea correcta.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre el turno al finalizar la jornada.<\u002Fstrong> Una vez completadas las actividades del día, asegúrese de cerrar correctamente el turno para mantener un registro preciso del tiempo trabajado.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Cierre la sesión antes de retirarse.<\u002Fstrong> Al terminar la jornada o dejar de utilizar el dispositivo, cierre siempre su sesión. Esta acción protege la información del negocio y evita que otras personas realicen operaciones utilizando su perfil.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Solicite ayuda ante cualquier duda o inconveniente.<\u002Fstrong> Si encuentra un problema que no puede resolver o identifica un comportamiento inusual en el sistema, informe la situación al administrador o al responsable técnico antes de continuar trabajando.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin:28px 0 14px;\">Preguntas frecuentes<\u002Fh5>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si registré una venta incorrectamente?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Si detecta un error inmediatamente después de registrar una venta, utilice la opción de anular o deshacer venta, siempre que esté disponible. Verifique que la operación haya quedado registrada correctamente en el historial de ventas antes de continuar con nuevas transacciones. Si no encuentra la opción o el tiempo para realizar la corrección ya ha finalizado, informe la situación al administrador del sistema.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si un producto no aparece en el inventario?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Primero, utilice la función de búsqueda para confirmar que el producto no se encuentra registrado con un nombre diferente. Si el producto sigue sin aparecer, comuníquese con el administrador para que verifique el inventario y realice los ajustes necesarios. No registre la venta utilizando otro producto como reemplazo, ya que esto generará inconsistencias en la información.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si la cantidad disponible de un producto es incorrecta?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Si identifica una diferencia entre la cantidad mostrada en el sistema y la existencia física del producto, informe la novedad al administrador antes de realizar modificaciones o continuar registrando ventas relacionadas con ese artículo. El administrador será el responsable de validar la información y realizar las correcciones necesarias.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si el sistema no responde?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Verifique que el dispositivo tenga una conexión estable a internet y espere unos segundos antes de volver a intentarlo. Evite presionar varias veces el mismo botón, ya que esto podría generar registros duplicados cuando la conexión se restablezca. Si el problema persiste, cierre la sesión, vuelva a ingresar al sistema y comuníquese con el administrador o con el responsable del soporte técnico.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si olvidé cerrar mi turno?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Informe la situación al administrador tan pronto como sea posible para que pueda verificar la información registrada y realizar los ajustes necesarios. Evite utilizar el perfil de otro usuario o iniciar un nuevo turno sin autorización, ya que esto puede generar inconsistencias en el registro de las jornadas de trabajo.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si cerré sesión por error?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Seleccione nuevamente su perfil desde la pantalla principal e ingrese al sistema. Verifique que su turno continúe activo y confirme que puede acceder normalmente a las funciones necesarias para continuar con sus actividades.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si aparece un mensaje de error?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Lea cuidadosamente el mensaje mostrado en pantalla y siga las instrucciones indicadas. Revise que todos los datos ingresados sean correctos y complete la información faltante, si es necesario. Si el mensaje continúa apareciendo después de varios intentos, tome nota de lo sucedido y comuníquese con el administrador o con el responsable técnico.<\u002Fp><\u002Fdiv>        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px 18px;margin-bottom:10px;max-width:820px;\"><div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">¿Qué debo hacer si otra persona utilizó mi perfil?<\u002Fdiv><p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Informe la situación al administrador lo antes posible. Recuerde cerrar siempre su sesión al finalizar la jornada o cuando deje de utilizar el dispositivo, incluso por periodos cortos de tiempo. Esto ayudará a proteger la información del negocio y evitará registros incorrectos asociados a su perfil.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════ S3: BUSINESS CASE ═══════════════════ -->\n<section id=\"s3\" style=\"padding:100px 52px;max-width:1200px;margin:0 auto;\">\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:16px;\">\n    <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#f5a623;\">03<\u002Fspan>\n    <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#526077;\">Visión Industrial<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(34px,4vw,60px);letter-spacing:-.02em;color:#f1f5f9;margin:0 0 48px;line-height:1;\">Business Case<\u002Fh2>\n  <div style=\"height:1px;background:linear-gradient(90deg,#2dd4bf,#1e2a3a);margin-bottom:40px;\"><\u002Fdiv>\n\n  <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:820px;margin:0 0 56px;\">El proyecto nace de una necesidad concreta: los negocios informales pequeños, como los que operan dentro del campus de la Universidad Nacional de Colombia, no tienen herramientas adecuadas para registrar sus ventas, controlar su inventario o tomar decisiones basadas en datos. <strong style=\"color:#dde4f0;\">Todo se maneja de memoria, en papel o en hojas de cálculo improvisadas<\u002Fstrong>, lo que genera pérdida de información, descuadres de caja y una visibilidad casi nula sobre el estado real del negocio.<\u002Fp>\n\n  <!-- 3.1 Análisis de costos -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc31\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">3.1<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Análisis de Costos de Operación<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc31\" style=\"padding:32px 0 40px 32px;display:block;\">\n      <!-- Hosting -->\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f5a623;margin:0 0 14px;\">1 · Hosting y Despliegue<\u002Fh4>\n      <p style=\"font-size:14px;line-height:1.7;color:#94a3b8;max-width:780px;margin:0 0 16px;\">El sistema está en <strong style=\"color:#dde4f0;\">Vercel<\u002Fstrong>. El plan Hobby es gratuito (despliegues ilimitados, HTTPS automático, subdominio vercel.app) pero pensado para uso personal. Un negocio debería migrar al plan Pro: $20 USD mensuales por miembro, que para 2 personas serían $40 USD (~$168.000 COP) mensuales.<\u002Fp>\n      <table style=\"width:100%;max-width:880px;border-collapse:collapse;margin-bottom:32px;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Alternativa<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Justificación<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:12px 14px;font-size:13px;color:#2dd4bf;font-weight:500;vertical-align:top;\">Railway<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">Similar a Vercel, más orientada a backend y BD integrados. Plan gratuito $5 USD crédito/mes. Plan de pago desde $5 USD/mes + consumo. ~$10-20 USD/mes (~$42.000-$84.000 COP).<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:12px 14px;font-size:13px;color:#2dd4bf;font-weight:500;vertical-align:top;\">Render<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">Despliega web con PostgreSQL incluida. Plan gratuito: el servidor duerme tras 15 min de inactividad. Plan activo $7 USD/mes (~$29.000 COP) — la opción más económica estable.<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:12px 14px;font-size:13px;color:#2dd4bf;font-weight:500;vertical-align:top;\">VPS<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">DigitalOcean o Linode desde $4 USD/mes (~$17.000 COP). Requieren mayor conocimiento técnico pero dan control total. Viable para un equipo universitario.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <!-- Base de datos -->\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f5a623;margin:0 0 14px;\">2 · Base de Datos<\u002Fh4>\n      <table style=\"width:100%;max-width:880px;border-collapse:collapse;margin-bottom:32px;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Recomendación<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Justificación<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:12px 14px;font-size:13px;color:#2dd4bf;font-weight:500;vertical-align:top;\">Supabase <span style=\"color:#f5a623;font-size:11px;\">★ acertado<\u002Fspan><\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">Compatible con el stack. PostgreSQL como servicio. Plan gratuito: 500MB, autenticación y API REST. Plan Pro $25 USD/mes (~$105.000 COP) con backups automáticos diarios.<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;font-weight:500;vertical-align:top;\">PlanetScale<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">Basado en MySQL, plan gratuito 5GB. Anunciaron en 2024 el cierre de su plan gratuito, por lo que no se recomienda como opción principal.<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;font-weight:500;vertical-align:top;\">Turso<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">SQLite distribuida, muy liviana. Plan gratuito generoso (9GB). Interesante si el proyecto no requiere consultas muy complejas.<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;font-weight:500;vertical-align:top;\">Firebase Firestore<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;line-height:1.6;\">NoSQL de Google. Plan gratuito amplio. Desventaja: las consultas analíticas del dashboard son más complejas de implementar que con PostgreSQL.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <!-- Dominio -->\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f5a623;margin:0 0 14px;\">3 · Dominio y Acceso<\u002Fh4>\n      <table style=\"width:100%;max-width:680px;border-collapse:collapse;margin-bottom:14px;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Proveedor<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Anual (COP)<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Mensual (COP)<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:13px;color:#94a3b8;\">Namecheap (.com)<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;\">$40.000<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#8892a6;\">$3.300<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:13px;color:#94a3b8;\">Google Domains (.com)<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;\">$50.000<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#8892a6;\">$4.200<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:13px;color:#94a3b8;\">Namecheap (.co)<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;\">$65.000<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#8892a6;\">$5.400<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;font-size:13px;color:#2dd4bf;\">Porkbun (.com) <span style=\"color:#f5a623;font-size:11px;\">★<\u002Fspan><\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;\">$35.000<\u002Ftd><td style=\"padding:10px 14px;font-size:13px;color:#8892a6;\">$2.900<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <p style=\"font-size:13px;color:#526077;max-width:680px;margin:0 0 32px;line-height:1.6;\">Porkbun es el registrador más económico y confiable para dominios .com. Se recomienda evitar dominios muy baratos de proveedores desconocidos, que suelen tener costos de renovación mucho más altos.<\u002Fp>\n\n      <!-- Auth + Monitoreo + Backups grid -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:880px;\">\n        <div>\n          <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f5a623;margin:0 0 12px;\">4 · Autenticación y Seguridad<\u002Fh4>\n          <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;margin-bottom:8px;\"><div style=\"font-size:13px;color:#2dd4bf;font-weight:600;margin-bottom:4px;\">Supabase Auth <span style=\"color:#526077;font-size:11px;font-weight:400;\">incluido en plan gratuito<\u002Fspan><\u002Fdiv><p style=\"font-size:12px;color:#8892a6;margin:0;line-height:1.6;\">Soporta login con email, PIN y roles personalizados — exactamente lo que el sistema necesita.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;margin-bottom:8px;\"><div style=\"font-size:13px;color:#8892a6;font-weight:600;margin-bottom:4px;\">Clerk <span style=\"color:#526077;font-size:11px;font-weight:400;\">$0<\u002Fspan><\u002Fdiv><p style=\"font-size:12px;color:#8892a6;margin:0;line-height:1.6;\">Plan gratuito hasta 10.000 usuarios activos mensuales. Interfaz de administración muy completa.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;\"><div style=\"font-size:13px;color:#8892a6;font-weight:600;margin-bottom:4px;\">Auth0<\u002Fdiv><p style=\"font-size:12px;color:#8892a6;margin:0;line-height:1.6;\">Más funcionalidades empresariales. Plan gratuito hasta 7.500 usuarios activos.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f5a623;margin:0 0 12px;\">5 · Monitoreo y 6 · Backups<\u002Fh4>\n          <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;margin-bottom:8px;\"><div style=\"font-size:13px;color:#2dd4bf;font-weight:600;margin-bottom:4px;\">Sentry <span style=\"color:#526077;font-size:11px;font-weight:400;\">$0<\u002Fspan><\u002Fdiv><p style=\"font-size:12px;color:#8892a6;margin:0;line-height:1.6;\">Detecta errores en tiempo real. Plan gratuito 5.000 errores mensuales.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;margin-bottom:8px;\"><div style=\"font-size:13px;color:#2dd4bf;font-weight:600;margin-bottom:4px;\">UptimeRobot <span style=\"color:#526077;font-size:11px;font-weight:400;\">$0<\u002Fspan><\u002Fdiv><p style=\"font-size:12px;color:#8892a6;margin:0;line-height:1.6;\">Verifica cada 5 min que el sistema esté en línea, envía alertas por email/WhatsApp. Hasta 50 monitores.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;\"><div style=\"font-size:13px;color:#8892a6;font-weight:600;margin-bottom:4px;\">Backups<\u002Fdiv><p style=\"font-size:12px;color:#8892a6;margin:0;line-height:1.6;\">Con Supabase Pro están incluidos diarios. En plan gratuito, script manual hacia Google Drive o Dropbox. El costo es tiempo de desarrollo, no dinero.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #2dd4bf;border-radius:4px;padding:18px 22px;max-width:880px;margin-top:28px;\">\n        <span style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#2dd4bf;\">Recomendación para el proyecto<\u002Fspan>\n        <p style=\"font-size:14px;color:#94a3b8;margin:8px 0 0;line-height:1.7;\">Para la etapa actual (prototipo universitario en Vercel), el escenario gratuito es completamente viable. Si llegara a implementarse en un negocio real, el escenario recomendado con <strong style=\"color:#dde4f0;\">Render + Supabase gratuito + dominio propio<\u002Fstrong> ofrece el mejor balance entre costo y confiabilidad, con un gasto mensual inferior a <strong style=\"color:#2dd4bf;\">$90.000 COP<\u002Fstrong>, mucho más económico que cualquier solución POS comercial del mercado colombiano.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 3.2 KPI e Impacto -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc32\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">3.2<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">KPI Principal e Impacto de Mercado<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc32\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:18px 22px;max-width:600px;margin-bottom:28px;\">\n        <span style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#f5a623;\">KPI Principal<\u002Fspan>\n        <div style=\"font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#f1f5f9;margin-top:6px;\">Total de ventas registradas por día<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.8;color:#94a3b8;max-width:820px;margin:0 0 24px;\">La economía informal en América Latina representó el <strong style=\"color:#dde4f0;\">34% del PIB<\u002Fstrong> promedio entre 2010 y 2017, la cifra más alta de cualquier región del mundo. Emplea a más del <strong style=\"color:#dde4f0;\">55.7%<\u002Fstrong> de la fuerza laboral de la región. En Colombia, la DIAN exige que el 80% de las empresas usen un sistema POS electrónico, buscando que la facturación sea 100% electrónica. El problema que este proyecto resuelve no solo afecta al negocio individual sino que es una <strong style=\"color:#dde4f0;\">brecha estructural del país<\u002Fstrong>.<\u002Fp>\n\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dde4f0;margin:0 0 18px;\">Gráficas de mejora de KPIs aplicadas al sistema<\u002Fh4>\n\n      <!-- Imagen 1: Cuatro KPIs -->\n      <div style=\"background:#f7f7f3;border:1px solid #1e2a3a;border-radius:8px;padding:18px 22px;max-width:820px;margin:0 0 16px;\">\n        <img src=\"a286a474-ff4a-458b-88b9-e5e965c68955\" alt=\"Ventas sin registrar antes ~25%, después &lt;5%, tiempo de cierre de caja -80%, aumento velocidad de caja +25%\" style=\"display:block;width:100%;height:auto;border-radius:4px;\">\n      <\u002Fdiv>\n\n      <!-- Imagen 2: Ventas registradas por día -->\n      <div style=\"background:#fff;border:1px solid #1e2a3a;border-radius:8px;padding:18px 22px;max-width:820px;margin:0 0 16px;\">\n        <img src=\"832d2179-a5f3-4bc2-b248-f63d61b3a506\" alt=\"Ventas registradas por día (estimado): comparación de barras rojas (sin sistema) y verdes (con sistema) de lunes a viernes\" style=\"display:block;width:100%;height:auto;border-radius:4px;\">\n      <\u002Fdiv>\n\n      <!-- Imagen 3: Comparativa de tiempos operativos -->\n      <div style=\"background:#fff;border:1px solid #1e2a3a;border-radius:8px;padding:18px 22px;max-width:820px;margin:0 0 16px;\">\n        <img src=\"25ef93f9-7433-4115-b59e-aa37b5659b6d\" alt=\"Comparativa de tiempos operativos: cierre de caja (min) y registro por venta (seg/10), antes y después del sistema\" style=\"display:block;width:100%;height:auto;border-radius:4px;\">\n      <\u002Fdiv>\n\n      <!-- Imagen 4: Tabla comparativa de KPIs -->\n      <div style=\"background:#fff;border:1px solid #1e2a3a;border-radius:8px;padding:18px 22px;max-width:820px;margin:0 0 32px;\">\n        <img src=\"f5419493-9632-4f09-8ebc-85bbf6ee6c13\" alt=\"Tabla comparativa de KPIs sin sistema vs con sistema y mejora porcentual\" style=\"display:block;width:100%;height:auto;border-radius:4px;\">\n      <\u002Fdiv>\n\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dde4f0;margin:0 0 14px;\">Impacto estimado sin sistema de registro<\u002Fh4>\n      <table style=\"width:100%;max-width:820px;border-collapse:collapse;margin-bottom:28px;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Situación<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Impacto Estimado<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:12px 14px;font-size:13px;color:#94a3b8;\">Ventas omitidas en horas pico<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#ef4444;\">15% – 30% del total diario sin registrar<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:12px 14px;font-size:13px;color:#94a3b8;\">Descuadres de caja frecuentes<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#ef4444;\">Pérdidas no detectadas de $5.000 – $20.000 COP por turno<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:12px 14px;font-size:13px;color:#94a3b8;\">Decisiones basadas en intuición<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;\">Sin datos, se compra inventario de más o de menos<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:12px 14px;font-size:13px;color:#94a3b8;\">Tiempo de cierre de caja manual<\u002Ftd><td style=\"padding:12px 14px;font-size:13px;color:#8892a6;\">45 – 90 minutos al final del turno<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #2dd4bf;border-radius:4px;padding:16px 20px;max-width:820px;\">\n        <p style=\"font-size:14px;color:#94a3b8;margin:0;line-height:1.7;\">Negocios que implementaron sistemas similares reportan un ahorro de <strong style=\"color:#2dd4bf;\">3 a 5 horas diarias<\u002Fstrong> de trabajo administrativo en la primera semana de uso. Para un negocio informal donde el dueño es también administrador y a veces vendedor, ese tiempo recuperado es directamente tiempo disponible para atender más clientes o tomar mejores decisiones.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 3.3 Comparativa competidores -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc33\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">3.3<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Comparativa con Soluciones Comerciales<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc33\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <table style=\"width:100%;max-width:920px;border-collapse:collapse;margin-bottom:24px;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 12px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#526077;\">Característica<\u002Fth>\n          <th style=\"text-align:center;padding:10px 12px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f5a623;\">Este Sistema<\u002Fth>\n          <th style=\"text-align:center;padding:10px 12px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#526077;\">Treinta<\u002Fth>\n          <th style=\"text-align:center;padding:10px 12px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#526077;\">Alegra POS<\u002Fth>\n          <th style=\"text-align:center;padding:10px 12px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#526077;\">Loggro POS<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Costo mensual<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">$0–$82.000 COP<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Gratuito (básico)<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">$80.000–$200.000<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">$150.000–$350.000<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Registro de ventas en tiempo real<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Separación vendedor / admin<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#f59e0b;text-align:center;\">Parcial<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Dashboard de KPIs<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#f59e0b;text-align:center;\">Básico<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Validador de caja<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Control de turnos por empleado<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Diseñado para contexto informal<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#ef4444;text-align:center;\">No<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Funciona desde celular<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#8892a6;text-align:center;\">Sí<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#f59e0b;text-align:center;\">Parcial<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 12px;font-size:12px;color:#94a3b8;\">Personalizable para el negocio<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#2dd4bf;text-align:center;\">Total<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#f59e0b;text-align:center;\">Limitado<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#f59e0b;text-align:center;\">Limitado<\u002Ftd><td style=\"padding:10px 12px;font-size:12px;color:#f59e0b;text-align:center;\">Limitado<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #f5a623;border-radius:4px;padding:16px 20px;max-width:820px;\">\n        <p style=\"font-size:14px;color:#94a3b8;margin:0;line-height:1.7;\">La <strong style=\"color:#dde4f0;\">ventaja diferencial<\u002Fstrong> más clara frente a los competidores es la combinación del <strong style=\"color:#f5a623;\">validador de caja con la gestión de turnos por empleado<\u002Fstrong>, algo que ninguna de las soluciones populares en Colombia ofrece de forma integrada para negocios informales pequeños.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 3.4 Pruebas con usuarios -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc34\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">3.4<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Prototipo Probado con Usuarios<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc34\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:800px;margin:0 0 28px;\">El prototipo fue construido en Figma Make a través de <strong style=\"color:#dde4f0;\">38 iteraciones documentadas<\u002Fstrong> y sometido a dos rondas de pruebas con usuarios reales, cuyos hallazgos cambiaron de forma significativa la arquitectura y funcionalidad del sistema.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:920px;\">\n        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-top:2px solid #f59e0b;border-radius:8px;padding:22px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;\">Primera Ronda (Iniciales)<\u002Fdiv>\n          <ul style=\"font-size:13px;color:#8892a6;list-style:none;padding:0;margin:0;line-height:1.7;\">\n            <li style=\"margin-bottom:8px;\">• Campos numéricos aceptaban valores negativos (meta diaria, precios, stock, caja). Un valor negativo rompió la página completa por error en cascada.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• El contador de ventas del inicio no coincidía con el de la pestaña Ventas.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• Las ventas anuladas seguían contabilizándose en ingresos, costos, utilidades y gráficos.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• El validador de caja no acumulaba correctamente el efectivo de múltiples ventas.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• El botón Limpiar fue identificado como riesgo de manipulación de datos.<\u002Fli>\n            <li>• Los porcentajes en Ventas superaban el 100% por error de cálculo.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-top:2px solid #ef4444;border-radius:8px;padding:22px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;\">Segunda Ronda (Finales)<\u002Fdiv>\n          <ul style=\"font-size:13px;color:#8892a6;list-style:none;padding:0;margin:0;line-height:1.7;\">\n            <li style=\"margin-bottom:8px;\">• El vendedor tenía acceso completo al dashboard (ingresos, utilidades, costos, meta): problema de privacidad y seguridad.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• El ID de venta usaba un código interno sin sentido para los trabajadores.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• El módulo de turnos no creaba registros reales ni validaba las horas trabajadas.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• La pantalla de confirmación aparecía para el admin pero no para el vendedor.<\u002Fli>\n            <li style=\"margin-bottom:8px;\">• Al cerrar el día, el sistema no reiniciaba la caja ni eliminaba las ventas anteriores.<\u002Fli>\n            <li>• Gráficos redundantes (líneas y torta con la misma información) y problemas al cerrar turnos.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 3.5 Primera versión vs MVP -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc35\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">3.5<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Primera Versión vs MVP Final<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc35\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <p style=\"font-size:14px;line-height:1.8;color:#94a3b8;max-width:800px;margin:0 0 24px;\">Cambios estructurales más relevantes que diferencian el prototipo inicial del MVP funcional desplegado en <a href=\"https://siti-proyect.vercel.app/\" target=\"_blank\" style=\"color:#4d94ff;\">siti-proyect.vercel.app<\u002Fa>.<\u002Fp>\n      <table style=\"width:100%;max-width:940px;border-collapse:collapse;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#526077;\">Aspecto<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#ef4444;\">Primera Versión<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;\">MVP Final<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Roles y vistas<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Una sola interfaz; el vendedor veía ingresos, utilidades y KPIs del negocio<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Dos flujos separados: panel admin y módulo de caja operativo sin acceso cruzado<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Botón Limpiar<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Presente en el historial como función de limpieza visual<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Eliminado completamente por riesgo de fraude<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Validaciones numéricas<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Campos aceptaban valores negativos; rompió la página en pruebas<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Restricción de mínimo 0 en todos los campos numéricos relevantes<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">ID de ventas<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Código interno sin sentido para el usuario<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Nomenclatura secuencial legible: V-001, V-002...<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Meta diaria<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Editable por cualquier usuario incluyendo el vendedor<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Solo el administrador puede editarla<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Categorías de productos<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Campo de texto libre<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Selector con opciones predefinidas: Comida, Bebida, Postre/dulce, Paquete, Combo<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Ventas anuladas<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Se contabilizaban en todos los KPIs y gráficos<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Excluidas de ingresos, costos, utilidades y gráficos; stock se revierte automáticamente<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Arquitectura técnica<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Prototipo monolítico con datos simulados (mocked data)<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">FastAPI + PostgreSQL con persistencia real y conexión estabilizada<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Estado al inicio del día<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Conservaba datos entre sesiones<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Estado limpio en cada apertura: sin ventas ni datos residuales<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Navegación por roles<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Barra de navegación completa visible para todos<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Navegación administrativa solo visible para el admin<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:10px 14px;font-size:12px;color:#dde4f0;font-weight:500;\">Confirmación de venta<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#8892a6;line-height:1.5;\">Solo visible para el administrador<\u002Ftd><td style=\"padding:10px 14px;font-size:12px;color:#94a3b8;line-height:1.5;\">Visible para ambos roles con información ajustada al contexto<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 3.6 Evolución por hitos -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc36\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">3.6<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Evolución del Sistema: del Concepto al MVP<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc36\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;max-width:860px;\">\n        <div style=\"display:flex;gap:20px;background:#0d1120;border:1px solid #1e2a3a;border-radius:8px;padding:22px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#f5a623;line-height:1;flex-shrink:0;\">H1<\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">Planteamiento del problema y alineación estratégica<\u002Fdiv>\n            <p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Identificar el problema desde la realidad de un integrante que opera en negocios informales del campus. Se definió el objetivo (reducción de costos y de pérdidas en horas pico), se diseñaron los KPIs, se construyó el BPMN To-Be y se estableció la alineación bajo el marco del <strong style=\"color:#dde4f0;\">Balanced Scorecard<\u002Fstrong>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;background:#0d1120;border:1px solid #1e2a3a;border-radius:8px;padding:22px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#4d94ff;line-height:1;flex-shrink:0;\">H2<\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">Prototipo de alta fidelidad y evaluación<\u002Fdiv>\n            <p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Prototipo en Figma Make con 38 iteraciones documentadas. Inventario de componentes bajo Diseño Atómico en React. Evaluación frente a las 10 heurísticas de Nielsen (6 satisfechas). Modelo de datos de 6 entidades y mapa de 19 endpoints REST.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;background:#0d1120;border:1px solid #1e2a3a;border-radius:8px;padding:22px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#2dd4bf;line-height:1;flex-shrink:0;\">H3<\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#dde4f0;margin-bottom:6px;\">Implementación y MVP funcional<\u002Fdiv>\n            <p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Transición del prototipo a un sistema funcional con persistencia real. La arquitectura monolítica FastAPI + PostgreSQL fue implementada y estabilizada. Desplegado en Vercel con manuales de usuario, administrador y documentación técnica disponibles.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════ S4: REFLEXIÓN DEL EQUIPO ═══════════════════ -->\n<section id=\"s4\" style=\"padding:100px 52px;background:#080b14;\">\n  <div style=\"max-width:920px;margin:0 auto;\">\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:16px;\">\n      <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#f5a623;\">04<\u002Fspan>\n      <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#526077;\">Sin uso de IA · Redacción Humana<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(34px,4vw,60px);letter-spacing:-.02em;color:#f1f5f9;margin:0 0 40px;line-height:1;\">Reflexión del Equipo<\u002Fh2>\n    <div style=\"height:1px;background:linear-gradient(90deg,#a78bfa,#1e2a3a);margin-bottom:48px;\"><\u002Fdiv>\n\n    <div style=\"font-size:16px;line-height:1.9;color:#94a3b8;\">\n      <p style=\"margin:0 0 24px;\">Crear una solución haciendo uso de herramientas contemporáneas es un desafío considerando los cuestionamientos actuales acerca del exceso de recursos a invertir o la productividad. Como equipo, a través del acercamiento a uno de nuestros compañeros de grupo, se nos permitió encontrar una problemática a solucionar haciendo uso de las tecnologías de vanguardia; <strong style=\"color:#dde4f0;\">la informalidad laboral en Colombia cerró 2025 en 55,1%<\u002Fstrong>, lo que indica una cifra considerable en los empleos informales del país. Es por ello que decidimos enfocarnos en la construcción de un sistema de información para los negocios pequeños e informales.<\u002Fp>\n\n      <p style=\"margin:0 0 24px;\">Durante cada una de las fases de este proyecto, las herramientas de inteligencia artificial tomaron un rol importante, funcionando en primer lugar como un <strong style=\"color:#dde4f0;\">punto de partida rápido y robusto<\u002Fstrong>. Para la creación del diseño interactivo de alta fidelidad, se tomó la decisión de usar Figma. Los modelos integrados en la plataforma permitieron la creación de un diseño a través de prompts. Si bien esta metodología era costosa en términos de recursos, las versiones gratuitas cumplían con lo necesario para lograr los hitos planteados. Contrariamente al aspecto económico, el tiempo —seguramente el recurso más valioso para el ámbito gerencial e informático— fue ampliamente optimizado gracias a estas herramientas.<\u002Fp>\n\n      <p style=\"margin:0 0 24px;\">Trabajar con modelos frontera nos permitió empaparnos en la discusión álgida del momento, donde ciertos trabajos podrían ser reemplazados por las máquinas. El historial de prompts bajo el cual diseñamos nuestra aplicación funciona como una recopilación de la <strong style=\"color:#dde4f0;\">interacción hombre-máquina<\u002Fstrong> durante la prematura revolución que vivimos; una donde el desarrollo lo hace la máquina, mientras el humano corrige reiteradamente bajo su criterio. El trabajo realizado deja en evidencia la constante supervisión de los modelos de inteligencia artificial que construyeron el diseño, además de la avidez de la objetividad humana desde la perspectiva técnica y de producto.<\u002Fp>\n\n      <p style=\"margin:0 0 24px;\">El trabajo realizado por los agentes facilitó el desarrollo y redujo tiempos; sin embargo, no abarcó por completo el esfuerzo humano, sino que <strong style=\"color:#dde4f0;\">lo distribuyó
