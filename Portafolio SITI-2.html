 hacia otras tareas<\u002Fstrong> inherentes al producto. En principio, desacoplar los recursos humanos de las capas más abstractas a nivel técnico parecía liberar carga de trabajo considerable, pero a medida que el diseño avanzaba, parte del trabajo liberado se encaminó hacia la corrección del desarrollo. Adicionalmente, esa emancipación técnica se dirigió a la capa de experiencia de usuario, donde la participación activa de las personas fue necesaria para mejorar el estado de la aplicación usando usuarios como sujetos de prueba y una visión meramente humana.<\u002Fp>\n\n      <p style=\"margin:0 0 24px;\">Las decisiones sobre el cómo y el porqué de la implementación se tomaron con base en lo aprendido durante la carrera por parte del equipo de arquitectos de sistemas; los modelos de inteligencia artificial se dedicaron particularmente al desarrollo de las ideas. Los LLMs actuales suelen ser de propósito general; especialmente para nuestro proyecto, se evidenció su propósito pragmático, orientado a la construcción de aplicaciones genéricas que satisfacen al público general mientras desarrollan código con evidentes limitaciones técnicas. El <strong style=\"color:#dde4f0;\">criterio humano fue fundamental<\u002Fstrong> para aumentar la calidad de la app, pues sin él, aspectos como la arquitectura y la accesibilidad no hubiesen formado parte del prototipo.<\u002Fp>\n\n      <p style=\"margin:0;\">Para finalizar, el uso de herramientas de inteligencia artificial no genera nuevo trabajo o acelera de manera única el desarrollo de un proyecto moderno, más bien redefine el paradigma de trabajo actual. La lección que deja esta etapa es que <strong style=\"color:#f5a623;\">las herramientas frontera generan mayor valor cuando se les entiende como un punto de partida sólido y no como un producto terminado<\u002Fstrong>; la ventaja competitiva no radica en tener acceso a la tecnología, sino en la capacidad humana de cuestionar, validar y afinar lo que esta entrega.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Bibliografía + Referencias -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:64px;\">\n      <div>\n        <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dde4f0;margin:0 0 16px;\">Bibliografía<\u002Fh4>\n        <ul style=\"font-size:12px;line-height:1.7;color:#8892a6;list-style:none;padding:0;margin:0;\">\n          <li style=\"margin-bottom:10px;\">Henderson, J. C., &amp; Venkatraman, N. (1993). <em>Strategic alignment: Leveraging information technology for transforming organizations.<\u002Fem> IBM Systems Journal, 32(1), 4–16.<\u002Fli>\n          <li style=\"margin-bottom:10px;\">Kaplan, R. S., &amp; Norton, D. P. (1996). <em>Using the Balanced Scorecard as a Strategic Management System.<\u002Fem> Harvard Business Review, 74(1), 75–85.<\u002Fli>\n          <li style=\"margin-bottom:10px;\">ISACA (2019). <em>COBIT 2019 Framework: Governance and Management Objectives.<\u002Fem> ISACA.<\u002Fli>\n          <li style=\"margin-bottom:10px;\">Hax, A.C. &amp; Majluf, N.S. (1991). <em>The Strategy Concept and Process: A Pragmatic Approach.<\u002Fem> Prentice-Hall.<\u002Fli>\n          <li style=\"margin-bottom:10px;\">Congreso de la República de Colombia (2019). <em>Ley 1988 de 2019<\u002Fem> — política pública de los vendedores informales.<\u002Fli>\n          <li style=\"margin-bottom:10px;\">ANIF (2025). <em>Entre avances y retrocesos: la evolución reciente de la informalidad en Colombia.<\u002Fem> Informe Semanal. <a href=\"https://www.anif.com.co/informe-semanal/entre-avances-y-retrocesos-la-evolucion-reciente-de-la-informalidad-en-colombia/\" target=\"_blank\" style=\"color:#4d94ff;word-break:break-all;\">anif.com.co<\u002Fa><\u002Fli>\n          <li>Fuentes complementarias: J.P. Morgan Private Bank (economía informal en Latinoamérica), loggro.com, micomercio.co.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dde4f0;margin:0 0 16px;\">Referencias de Prompts (IA)<\u002Fh4>\n        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-radius:6px;padding:16px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.7;color:#8892a6;max-height:280px;overflow-y:auto;\">\n          <p style=\"margin:0 0 10px;color:#a78bfa;\">// Diagrama entidad-relación + Mapa de API<\u002Fp>\n          <p style=\"margin:0 0 10px;\">Prompt(\"Analiza el código fuente del prototipo Figma .zip y genera draft para diagrama ER con claves primarias/foráneas, tipos y cardinalidad; mapa de API como lista plana con método HTTP, ruta y descripción.\")<\u002Fp>\n          <p style=\"margin:0 0 10px;color:#a78bfa;\">// Inventario de componentes<\u002Fp>\n          <p style=\"margin:0 0 10px;\">Prompt(\"Inventario de componentes: identificar elementos que se repiten (botones, formularios, tarjetas) y cómo se estructuraría en React.\")<\u002Fp>\n          <p style=\"margin:0 0 10px;color:#a78bfa;\">// Otros prompts documentados<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Convierte la subsección de moléculas en una tabla más presentable.\")<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Introducción WCAG para el proyecto con imágenes del Figma.\")<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Reescribe la tabla de problemas detectados vs soluciones.\")<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Redacta la introducción del business case según los entregables 1 y 2.\")<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Alternativas distintas a Vercel con links.\")<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Referencias de modelos similares existentes.\")<\u002Fp>\n          <p style=\"margin:0 0 6px;\">Prompt(\"Gráficas de mejora de KPIs aplicadas a nuestro sistema.\")<\u002Fp>\n          <p style=\"margin:0 0 10px;\">Prompt(\"Compara precios de sistemas POS similares.\")<\u002Fp>\n          <p style=\"margin:0 0 10px;color:#a78bfa;\">// Portafolio web — tercer entregable<\u002Fp>\n          <p style=\"margin:0;\">Prompt(\"El resumen y la introducción pertenecen al entrañable pasado, crea unos nuevos de acuerdo a la información actual. Incluye este prompt en las referencias de IA.\")<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════ FOOTER ═══════════════════ -->\n<footer style=\"background:#03040a;padding:56px 52px;border-top:1px solid #111827;\">\n  <div style=\"max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:32px;\">\n    <div>\n      <div style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#f1f5f9;margin-bottom:8px;\">SITI · Grupo 4<\u002Fdiv>\n      <p style=\"font-size:13px;color:#526077;margin:0;max-width:420px;line-height:1.7;\">Sistema de Información para Trabajos Informales. Tercer Entregable — Sistemas de Información. Universidad Nacional de Colombia, 2026-I.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:32px;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#526077;margin-bottom:8px;\">Secciones<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px;\">\n          <a href=\"#s1\" style=\"font-size:13px;color:#8892a6;text-decoration:none;\">01 Consolidado de Ingeniería<\u002Fa>\n          <a href=\"#s2\" style=\"font-size:13px;color:#8892a6;text-decoration:none;\">02 Mantenimiento y Operación<\u002Fa>\n          <a href=\"#s3\" style=\"font-size:13px;color:#8892a6;text-decoration:none;\">03 Business Case<\u002Fa>\n          <a href=\"#s4\" style=\"font-size:13px;color:#8892a6;text-decoration:none;\">04 Reflexión del Equipo<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#526077;margin-bottom:8px;\">MVP<\u002Fdiv>\n        <a href=\"https://siti-proyect.vercel.app/\" target=\"_blank\" style=\"font-size:13px;color:#4d94ff;text-decoration:none;line-height:2;\">siti-proyect.vercel.app<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440 }\n}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // Accordion toggle\n    document.querySelectorAll('.acc-btn').forEach(btn => {\n      btn.addEventListener('click', () => {\n        const targetId = btn.getAttribute('data-target');\n        const panel = document.getElementById(targetId);\n        if (!panel) return;\n        const isOpen = panel.style.display !== 'none';\n        panel.style.display = isOpen ? 'none' : 'block';\n        const icon = btn.querySelector('.acc-icon');\n        if (icon) icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';\n      });\n    });\n\n    // Set initial rotation for open panels\n    ['acc11','acc21','acc31'].forEach(id => {\n      const btn = document.querySelector(`[data-target=\"${id}\"]`);\n      if (btn) {\n        const icon = btn.querySelector('.acc-icon');\n        if (icon) icon.style.transform = 'rotate(180deg)';\n      }\n    });\n\n    // Scroll spy for nav\n    const navLinks = {\n      's1': document.getElementById('nl-s1'),\n      's2': document.getElementById('nl-s2'),\n      's3': document.getElementById('nl-s3'),\n      's4': document.getElementById('nl-s4'),\n    };\n    const setActive = (id) => {\n      Object.entries(navLinks).forEach(([k, el]) => {\n        if (!el) return;\n        if (k === id) { el.style.color = '#f5a623'; el.style.borderBottom = '1px solid #f5a623'; }\n        else { el.style.color = '#526077'; el.style.borderBottom = '1px solid transparent'; }\n      });\n    };\n    const observer = new IntersectionObserver(\n      (entries) => {\n        entries.forEach(entry => { if (entry.isIntersecting) setActive(entry.target.id); });\n      },\n      { rootMargin: '-15% 0px -75% 0px', threshold: 0 }\n    );\n    ['s1','s2','s3','s4'].forEach(id => {\n      const el = document.getElementById(id);\n      if (el) observer.observe(el);\n    });\n  }\n\n  renderVals() { return {}; }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
