document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle=\"font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#f1f5f9;\">SITI · GRUPO 4<\u002Fdiv>\n  <div style=\"display:flex;gap:26px;align-items:center;\">\n    <a id=\"nl-s1\" href=\"#s1\" style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#f5a623;text-decoration:none;padding-bottom:3px;border-bottom:1px solid #f5a623;transition:all .2s;\">01 Consolidado<\u002Fa>\n    <a id=\"nl-s2\" href=\"#s2\" style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#526077;text-decoration:none;padding-bottom:3px;border-bottom:1px solid transparent;transition:all .2s;\">02 Mantenimiento<\u002Fa>\n    <a id=\"nl-s3\" href=\"#s3\" style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#526077;text-decoration:none;padding-bottom:3px;border-bottom:1px solid transparent;transition:all .2s;\">03 Business Case<\u002Fa>\n    <a id=\"nl-s4\" href=\"#s4\" style=\"font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#526077;text-decoration:none;padding-bottom:3px;border-bottom:1px solid transparent;transition:all .2s;\">04 Reflexión<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ═══════════════════ HERO ═══════════════════ -->\n<section style=\"min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 52px 64px;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;top:15%;left:5%;width:700px;height:700px;background:radial-gradient(circle,#f59e0b08 0%,transparent 65%);pointer-events:none;animation:glow 6s ease-in-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute;top:40%;right:5%;width:500px;height:500px;background:radial-gradient(circle,#3b82f608 0%,transparent 65%);pointer-events:none;animation:glow 8s ease-in-out infinite 2s;\"><\u002Fdiv>\n  <div style=\"position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 80px,#ffffff03 80px,#ffffff03 81px),repeating-linear-gradient(90deg,transparent,transparent 80px,#ffffff03 80px,#ffffff03 81px);pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#f5a623;margin-bottom:24px;animation:fadeUp .8s ease both .1s;\">\n      Portafolio de Ingeniería · Tercer Entregable · Sistemas de Información\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(48px,6.5vw,104px);line-height:.92;letter-spacing:-.03em;color:#f1f5f9;margin:0 0 4px;animation:fadeUp .8s ease both .2s;\">\n      Sistema de Información\n    <\u002Fh1>\n    <h1 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(48px,6.5vw,104px);line-height:.92;letter-spacing:-.03em;margin:0 0 44px;animation:fadeUp .8s ease both .3s;\">\n      <span style=\"color:#f1f5f9;\">para Trabajos <\u002Fspan><span style=\"color:#f5a623;font-style:italic;\">Informales<\u002Fspan>\n    <\u002Fh1>\n\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:48px;max-width:1000px;animation:fadeUp .8s ease both .5s;\">\n      <div>\n        <div style=\"font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#f5a623;margin-bottom:10px;\">Equipo · Grupo 4<\u002Fdiv>\n        <div style=\"font-size:13px;color:#94a3b8;line-height:1.85;\">\n          David Eduardo Calderón Parra<br>\n          Diego Alexander Ibáñez Torres<br>\n          Juan Sebastián Gámez Ariza<br>\n          Pablo Esteban Olaya Arias<br>\n          Jorge Mario Naged Sánchez<br>\n          Valeria Uribe\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#f5a623;margin-bottom:10px;\">Profesor<\u002Fdiv>\n        <div style=\"font-size:13px;color:#94a3b8;line-height:1.7;\">Jhon Alexander García Camargo<\u002Fdiv>\n        <div style=\"font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#f5a623;margin:20px 0 10px;\">MVP Desplegado<\u002Fdiv>\n        <div style=\"font-size:13px;color:#94a3b8;line-height:1.7;\"><a href=\"https://siti-proyect.vercel.app/\" target=\"_blank\" style=\"color:#4d94ff;text-decoration:none;\">siti-proyect.vercel.app<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#f5a623;margin-bottom:10px;\">Institución<\u002Fdiv>\n        <div style=\"font-size:13px;color:#94a3b8;line-height:1.75;\">Universidad Nacional de Colombia<br>Facultad de Ingeniería<br>Ing. de Sistemas e Industrial<br>Bogotá D.C. · 2026-I<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;bottom:36px;right:52px;display:flex;flex-direction:column;align-items:center;gap:10px;\">\n    <div style=\"font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#526077;writing-mode:vertical-rl;\">Scroll<\u002Fdiv>\n    <div style=\"width:1px;height:56px;background:linear-gradient(180deg,#f5a623,transparent);\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════ RESUMEN / INTRODUCCIÓN ═══════════════════ -->\n<section style=\"padding:90px 52px;max-width:1200px;margin:0 auto;\">\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;\">\n    <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-top:2px solid #f5a623;border-radius:8px;padding:32px;\">\n      <div style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#f5a623;margin-bottom:16px;\">Resumen<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.8;color:#94a3b8;margin:0;\">Este tercer entregable consolida la materialización del Sistema de Información para Trabajos Informales en un <strong style=\"color:#dde4f0;\">MVP funcional desplegado<\u002Fstrong>, dejando atrás el prototipo con datos simulados para operar sobre una arquitectura monolítica real de FastAPI, React y PostgreSQL. El documento se organiza en cuatro frentes: el <strong style=\"color:#dde4f0;\">consolidado de ingeniería<\u002Fstrong>, que recapitula las decisiones técnicas, la gestión de excepciones y la deuda técnica; el <strong style=\"color:#dde4f0;\">manual de mantenimiento y operación (DevOps Lite)<\u002Fstrong>, con el stack, la estrategia de evolución y el inventario de componentes; el <strong style=\"color:#dde4f0;\">business case<\u002Fstrong>, con el análisis de costos de operación, el impacto sobre el KPI principal y la comparativa frente a soluciones comerciales del mercado colombiano; y la <strong style=\"color:#dde4f0;\">reflexión del equipo<\u002Fstrong> sobre el uso de herramientas de inteligencia artificial a lo largo del proyecto.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-top:2px solid #4d94ff;border-radius:8px;padding:32px;\">\n      <div style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#4d94ff;margin-bottom:16px;\">Introducción<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.8;color:#94a3b8;margin:0;\">El proyecto responde a una realidad concreta: <strong style=\"color:#dde4f0;\">la informalidad laboral en Colombia cerró 2025 en 55,7%<\u002Fstrong>, y los pequeños negocios informales —como los del campus de la Universidad Nacional— carecen de herramientas para registrar ventas, controlar inventario y decidir con datos. Tras el planteamiento estratégico del Hito 1 y el prototipo evaluado del Hito 2, este tercer entregable corresponde al <strong style=\"color:#dde4f0;\">Hito 3: la transición a un sistema funcional con persistencia real<\u002Fstrong>, accesible en siti-proyect.vercel.app. El presente portafolio recopila el cierre de ingeniería del sistema, su plan de mantenimiento y operación, la justificación económica e industrial de su valor, y una reflexión crítica del equipo sobre cómo las herramientas de inteligencia artificial redefinieron el paradigma de trabajo a lo largo del semestre.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════ S1: CONSOLIDADO DE INGENIERÍA ═══════════════════ -->\n<section id=\"s1\" style=\"padding:100px 52px;max-width:1200px;margin:0 auto;\">\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:16px;\">\n    <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#f5a623;\">01<\u002Fspan>\n    <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#526077;\">Sección Recapitulativa<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(34px,4vw,60px);letter-spacing:-.02em;color:#f1f5f9;margin:0 0 48px;line-height:1;\">Consolidado de<br>Ingeniería<\u002Fh2>\n  <div style=\"height:1px;background:linear-gradient(90deg,#f5a623,#1e2a3a);margin-bottom:56px;\"><\u002Fdiv>\n\n  <!-- 1.1 BPMN To-Be -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc11\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">1.1<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">El BPMN To-Be como guía de la Ruta Feliz (Happy Path)<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc11\" style=\"padding:32px 0 40px 32px;display:block;\">\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 20px;\">El diagrama <strong style=\"color:#dde4f0;\">BPMN To-Be<\u002Fstrong> diseñado en el Hito 1 funcionó como el plano fundacional para el Frontend en el Hito 2. Estableció de manera estricta las rutas de acción y la secuencia lógica del proceso de venta (selección de producto, cálculo de total, confirmación de pago, etc).<\u002Fp>\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 20px;\">Sin embargo, el modelo BPMN original se centró en el <strong style=\"color:#dde4f0;\">camino ideal<\u002Fstrong>. Sin tener establecidos todos los posibles caminos dentro del sistema, resultó en una cadena de errores significativos que poco a poco hacían que el sistema perdiera funcionalidad. Al solo trabajar con el caso ideal, bajo condiciones excepcionales se tenía una robusta corrección de errores; sin embargo, aquello no considerado dentro del BPMN frecuentemente presentó errores reflejados en los test de prueba.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 1.2 Brecha Monolítico -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc12\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">1.2<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">La Brecha entre el Prototipo Monolítico y las Excepciones<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc12\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 20px;\">El primer gran reto de ingeniería surgió al intentar romper el <strong style=\"color:#dde4f0;\">\"monolito visual\"<\u002Fstrong> diseñado originalmente en Figma. Todo el estado de la aplicación estaba precargado y simulado (<em>mocked data<\u002Fem>); era un lugar desconocido en el cual se tenía una idea del sistema pero se desconocían todos los procesos interiores de la plataforma, agrandando la brecha técnica al punto en el que ya no se podía modificar de forma específica para aplicar las excepciones.<\u002Fp>\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 24px;\">Al no tener modelados estos casos de excepción en el BPMN original, el Frontend inicial carecía de las validaciones necesarias en el código. Conforme se le daban indicaciones al Figma, este rehacía todo y era como iniciar desde cero, confiando en que se solucionarían los errores y se mantendría lo ya configurado, que en ocasiones no era así y se regresaba a versiones anteriores. Como consecuencia, durante las primeras interacciones lógicas, el programa sufría desconfiguraciones por <strong style=\"color:#dde4f0;\">errores en cascada<\u002Fstrong>.<\u002Fp>\n\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dde4f0;margin:0 0 16px;\">Mitigación y Descubrimiento mediante Pruebas<\u002Fh4>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:860px;\">\n        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #f59e0b;border-radius:6px;padding:20px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:8px;\">Primera Ola de Errores<\u002Fdiv>\n          <p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Pruebas iniciales. Identificaron los primeros fallos de consistencia en el Frontend al forzar al sistema a salir de la ruta ideal: fallos en procesos lógicos (guardar ventas, cuadre de caja) y garantías mínimas de calidad (permitía números negativos en costos y valores).<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #ef4444;border-radius:6px;padding:20px;\">\n          <div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#ef4444;margin-bottom:8px;\">Segunda Ola de Errores<\u002Fdiv>\n          <p style=\"font-size:13px;color:#8892a6;margin:0;line-height:1.7;\">Pruebas finales de integración. Surgieron múltiples errores puntuales pero de alto impacto en el funcionamiento del modelo de ventas. Demostraron que el sistema requería un <strong style=\"color:#dde4f0;\">manejo de excepciones robusto<\u002Fstrong> para no comprometer la experiencia del usuario informal.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 1.3 Arquitectura Monolítica -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc13\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">1.3<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Centralización en Arquitectura Monolítica (FastAPI + PostgreSQL)<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc13\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 24px;\">El sistema opera bajo un modelo de <strong style=\"color:#dde4f0;\">arquitectura monolítica<\u002Fstrong>, fundamentado en la tríada Backend-Frontend-Base de Datos dentro del mismo despliegue. Los <em>System Architects<\u002Fem> enfocaron sus recursos en estructurar e integrar de forma acoplada las rutas de la interfaz, los endpoints de FastAPI y el mapeo objeto-relacional (ORM) hacia la base de datos en PostgreSQL.<\u002Fp>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:0;max-width:680px;background:#0d1120;border:1px solid #1e2a3a;border-radius:8px;padding:32px;margin-bottom:24px;\">\n        <div style=\"background:#111827;border:1px solid #253044;border-radius:6px;padding:16px 28px;text-align:center;\"><div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#f5a623;\">React<\u002Fdiv><div style=\"font-size:11px;color:#8892a6;margin-top:4px;\">Frontend<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:36px;height:1px;background:#253044;display:flex;align-items:center;justify-content:center;\"><span style=\"font-size:15px;color:#526077;\">↔<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#111827;border:1px solid #253044;border-radius:6px;padding:16px 28px;text-align:center;\"><div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#4d94ff;\">FastAPI<\u002Fdiv><div style=\"font-size:11px;color:#8892a6;margin-top:4px;\">Backend<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:36px;height:1px;background:#253044;display:flex;align-items:center;justify-content:center;\"><span style=\"font-size:15px;color:#526077;\">↔<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#111827;border:1px solid #253044;border-radius:6px;padding:16px 28px;text-align:center;\"><div style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#2dd4bf;\">PostgreSQL<\u002Fdiv><div style=\"font-size:11px;color:#8892a6;margin-top:4px;\">Base de Datos<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0;\">Este enfoque implicó un alto consumo de recursos: al fallar una sola ruta o excepción en el Frontend, se corría el riesgo de desestabilizar todo el sistema. El equipo tuvo que adaptar el frontend ya establecido y desde allí programar el backend y la conexión con la base de datos, lo que representó un desafío adicional porque no se podía cambiar el frontend hasta tener la arquitectura frontend-backend-BD estabilizada.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 1.4 Deuda Técnica + Matriz -->\n  <div style=\"margin-bottom:2px;\">\n    <button class=\"acc-btn\" data-target=\"acc14\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">1.4<\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Gestión de Deuda Técnica y Matriz de Trazabilidad<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n    <\u002Fbutton>\n    <div id=\"acc14\" style=\"padding:32px 0 40px 32px;display:none;\">\n      <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 24px;\">El test final arrojó una serie de errores puntuales registrados en la tabla de control. Debido a la priorización estricta de recursos para estabilizar la conexión del monolito (FastAPI + Postgres) y asegurar que la lógica de negocio fuera segura, estos fallos remanentes fueron clasificados formalmente como <strong style=\"color:#f5a623;\">Deuda Técnica Gráfica y de Usabilidad<\u002Fstrong>. Al estar la persistencia y la seguridad del núcleo a salvo, estos errores estéticos o de flujo menor quedan como hoja de ruta para futuras mejoras.<\u002Fp>\n\n      <h4 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dde4f0;margin:0 0 16px;\">Matriz de Trazabilidad<\u002Fh4>\n      <table style=\"width:100%;max-width:900px;border-collapse:collapse;\">\n        <thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\">\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Historia de Usuario<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Vista<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">API<\u002Fth>\n          <th style=\"text-align:left;padding:10px 14px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Tabla DB<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;vertical-align:top;\"><strong>HU-001-b<\u002Fstrong><br><span style=\"color:#8892a6;font-size:12px;\">Selección de artículos más rápida · Vendedor<\u002Fspan><\u002Ftd><td style=\"padding:10px 14px;vertical-align:top;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#4d94ff;\">/vendedor/ventas<\u002Fspan><br><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#526077;\">(SaleRow-CTt9k-lb.js)<\u002Fspan><\u002Ftd><td style=\"padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#2dd4bf;vertical-align:top;word-break:break-all;\">GET http://localhost:4100/configuracion/meta-diaria<\u002Ftd><td style=\"padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#f5a623;vertical-align:top;\">CONFIGURACION, PRODUCTO<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;vertical-align:top;\"><strong>HU-001-c<\u002Fstrong><br><span style=\"color:#8892a6;font-size:12px;\">Procesamiento de venta y confirmación · Vendedor<\u002Fspan><\u002Ftd><td style=\"padding:10px 14px;vertical-align:top;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#4d94ff;\">/vendedor/ventas<\u002Fspan><br><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#526077;\">(NewSale-Ddqq59X9.js)<\u002Fspan><\u002Ftd><td style=\"padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#2dd4bf;vertical-align:top;word-break:break-all;\">POST http://localhost:4100/auth/login<\u002Ftd><td style=\"padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#f5a623;vertical-align:top;\">VENDEDOR, VENTA, VENTA_ITEM<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:10px 14px;font-size:13px;color:#dde4f0;vertical-align:top;\"><strong>HU-002<\u002Fstrong><br><span style=\"color:#8892a6;font-size:12px;\">Formulario simplificado para registro de ventas · Vendedor<\u002Fspan><\u002Ftd><td style=\"padding:10px 14px;vertical-align:top;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#4d94ff;\">/vendedor/ventas<\u00 ;\">\n  <div style=\"max-width:1200px;margin:0 auto;\">\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:16px;\">\n      <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#f5a623;\">02<\u002Fspan>\n      <span style=\"font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#526077;\">DevOps Lite<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(34px,4vw,60px);letter-spacing:-.02em;color:#f1f5f9;margin:0 0 48px;line-height:1;\">Manual de Mantenimiento<br>y Operación<\u002Fh2>\n    <div style=\"height:1px;background:linear-gradient(90deg,#4d94ff,#1e2a3a);margin-bottom:56px;\"><\u002Fdiv>\n\n    <!-- 2.1 Stack & Estrategia -->\n    <div style=\"margin-bottom:2px;\">\n      <button class=\"acc-btn\" data-target=\"acc21\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">2.1<\u002Fspan>\n          <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Stack Tecnológico y Estrategia de Evolución<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n      <\u002Fbutton>\n      <div id=\"acc21\" style=\"padding:32px 0 40px 32px;display:block;\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;\">\n          <span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#4d94ff;\">React<\u002Fspan>\n          <span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#2dd4bf;\">FastAPI<\u002Fspan>\n          <span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#f5a623;\">PostgreSQL<\u002Fspan>\n          <span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a78bfa;\">Firebase<\u002Fspan>\n          <span style=\"background:#111827;border:1px solid #253044;border-radius:4px;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8892a6;\">Vercel<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 20px;\">La arquitectura modular del sistema, fundamentada en React, Firebase y servicios desacoplados, ha sido proyectada para facilitar una <strong style=\"color:#dde4f0;\">evolución constante y un mantenimiento simplificado<\u002Fstrong>. Este diseño permite integrar nuevas capacidades y ajustar las existentes para cumplir con normativas cambiantes sin arriesgar la estabilidad operativa.<\u002Fp>\n        <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0 0 20px;\">Actualmente la solución se centra en la gestión de inventario, ventas y turnos, omitiendo por ahora procesos como la contabilidad avanzada o la facturación electrónica. No obstante, su estructura técnica está preparada para incorporar estas funcionalidades en el futuro si el contexto del negocio o el marco legal lo exigen.<\u002Fp>\n        <div style=\"background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #f5a623;border-radius:4px;padding:16px 20px;max-width:740px;margin-bottom:20px;\">\n          <p style=\"font-size:14px;color:#94a3b8;margin:0;line-height:1.7;\">Para preservar la integridad del proyecto, los ajustes funcionales deben seguir la <strong style=\"color:#dde4f0;\">lógica modular establecida<\u002Fstrong>: los cambios visuales se limitarán a los componentes de la interfaz, mientras que la lógica operativa se centralizará en hooks y servicios. Toda actualización del modelo de datos requerirá la revisión de las reglas de seguridad e índices en Firestore.<\u002Fp>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:780px;margin:0;\">Antes de cualquier despliegue es obligatorio realizar pruebas funcionales que validen la seguridad, el rendimiento y la ausencia de regresiones en los flujos críticos. El proceso de actualización se regirá por un flujo de control de versiones donde cada cambio se trabaje en ramas independientes y sea revisado antes de su integración final.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- 2.2 Manuales del Sistema -->\n    <div style=\"margin-bottom:2px;\">\n      <button class=\"acc-btn\" data-target=\"acc22\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #1e2a3a;padding:20px 0;cursor:pointer;text-align:left;\">\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#526077;\">2.2<\u002Fspan>\n          <span style=\"font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;\">Manuales del Sistema<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"acc-icon\" style=\"color:#f5a623;font-size:14px;transition:transform .3s;\">▼<\u002Fspan>\n      <\u002Fbutton>\n      <div id=\"acc22\" style=\"padding:32px 0 40px 32px;display:none;\">\n        <p style=\"font-size:15px;line-height:1.8;color:#94a3b8;max-width:820px;margin:0 0 28px;\">El sistema cuenta con manuales operativos dirigidos a cada perfil. A continuación se presentan, de forma íntegra, el Manual del Administrador y el Manual del Usuario. Despliegue cada uno para consultar su contenido completo.<\u002Fp>\n\n        <button class=\"acc-btn\" data-target=\"accManTec\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;background:#0d1120;border:1px solid #1e2a3a;border-left:3px solid #2dd4bf;border-radius:6px;padding:16px 18px;cursor:pointer;text-align:left;margin-bottom:12px;\">\n          <span style=\"display:flex;flex-direction:column;gap:3px;\"><span style=\"font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#2dd4bf;\">Manual Técnico<\u002Fspan><span style=\"font-size:12px;color:#8892a6;\">Arquitectura, estructura, modelo de datos, módulos, seguridad y deuda técnica<\u002Fspan><\u002Fspan>\n          <span class=\"acc-icon\" style=\"color:#2dd4bf;font-size:13px;transition:transform .3s;\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div id=\"accManTec\" style=\"display:none;padding:8px 0 24px;border-bottom:1px solid #141c2b;margin-bottom:16px;\">\n        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">1. Introducción<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El presente documento técnico tiene como propósito describir la arquitectura, el funcionamiento y el estado actual del Sistema de Información para la Gestión de Ventas en Trabajos Informales. Este proyecto se origina ante la necesidad de pequeños negocios y trabajadores del sector informal de contar con una herramienta digital que les permita superar las limitaciones de los registros manuales o de mecanismos poco estructurados, mejorando así el control y la trazabilidad de sus operaciones diarias.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El sistema centraliza y digitaliza procesos clave del negocio, entre los que se incluyen:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Registro de ventas<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Administración de inventario<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Gestión de turnos de trabajo<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Seguimiento de indicadores operativos<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La automatización de estas actividades reduce errores de captura, garantiza la integridad de los datos y facilita una toma de decisiones basada en información confiable.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Desde el punto de vista técnico, el proyecto adopta una arquitectura modular con una clara separación de responsabilidades entre la capa de presentación (interfaz de usuario), la capa de lógica de negocio y la capa de gestión de datos. Además, se implementa una estructura de componentes reutilizables basada en principios de diseño atómico, lo que asegura escalabilidad, consistencia visual y mantenibilidad a medida que el sistema evoluciona.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Estado actual del proyecto:<\u002Fstrong> proyecto se encuentra en desarrollo activo, con las funcionalidades centrales operativas y los módulos adicionales en progreso según se detalla más adelante en este documento.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El objetivo principal del sistema es proveer una plataforma eficiente para registrar, consultar y administrar información operativa, permitiendo a los administradores reducir el tiempo de gestión de datos y a los empleados agilizar el proceso de ventas frente al cliente, mejorando así el rendimiento global del negocio.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">2. Alcance y objetivo<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El presente documento tiene como objetivo proporcionar una visión integral del Sistema de Información para la Gestión de Ventas en Trabajos Informales, facilitando la comprensión de su arquitectura, componentes, tecnologías empleadas y funcionamiento interno para futuros desarrolladores, mantenedores e ingenieros de software. El alcance del sistema comprende la gestión digital de procesos operativos de pequeños negocios, incluyendo la administración de usuarios y roles, el registro y consulta de ventas, el control de inventario, la gestión de turnos de trabajo y la visualización de métricas e indicadores de desempeño. Asimismo, esta documentación describe las principales dependencias, configuraciones y puntos de extensión del proyecto con el fin de simplificar futuras tareas de mantenimiento, corrección de errores e incorporación de nuevas funcionalidades. El sistema se encuentra orientado exclusivamente a la gestión operativa del negocio y no contempla, en su estado actual, funcionalidades avanzadas como facturación electrónica, integración con pasarelas de pago, gestión contable completa o interoperabilidad con sistemas externos.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">3. Arquitectura general<\u002Fh5>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">3.1. Diagrama de arquitectura<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El Sistema de Información para la Gestión de Ventas en Trabajos Informales adopta una arquitectura de tipo cliente-servidor basada en servicios en la nube, donde la lógica de presentación se ejecuta en el navegador del usuario y la persistencia de datos se delega a servicios administrados de terceros.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La aplicación funciona como una Single Page Application (SPA) desarrollada con React y construida mediante Vite, permitiendo una experiencia de usuario fluida sin recargas completas de página. El frontend se comunica directamente con los servicios de persistencia a través de APIs proporcionadas por la plataforma de backend utilizada. La aplicación se encuentra desplegada en la plataforma de hosting de Vercel.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">3.2. Separación entre frontend, backend y persistencia<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">La arquitectura del sistema se divide en tres capas principales:<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Frontend.<\u002Fstrong> Corresponde a la interfaz gráfica utilizada por los administradores y usuarios operativos. Sus responsabilidades incluyen: renderizar la interfaz de usuario; gestionar la navegación entre módulos; validar datos antes de enviarlos; administrar el estado de la aplicación; mostrar indicadores, gráficos y reportes; y consumir los servicios de backend. Esta capa está implementada mediante React, Vite, bibliotecas de componentes y estilos, y servicios y utilidades internas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Backend.<\u002Fstrong> La lógica de negocio y los servicios transversales se implementan utilizando una arquitectura Backend as a Service (BaaS). El backend es responsable de: gestionar la autenticación de usuarios; aplicar reglas de acceso; procesar operaciones CRUD; garantizar la integridad de la información; y exponer servicios de persistencia al frontend.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">Persistencia.<\u002Fstrong> La capa de persistencia almacena toda la información operativa del sistema. Entre los datos gestionados se encuentran: productos, inventario, ventas, turnos, usuarios y configuraciones del sistema. La persistencia se implementa mediante una base de datos NoSQL en la nube, organizada en colecciones y documentos, lo que facilita la escalabilidad y el acceso en tiempo real.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Servicios externos utilizados<\u002Fh6>        <table style=\"width:100%;max-width:820px;border-collapse:collapse;margin:0 0 18px;\"><thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\"><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Servicio<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Propósito<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Firebase Authentication<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Gestión de autenticación y control de acceso.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Cloud Firestore<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Almacenamiento y sincronización de datos.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Firebase Storage<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Almacenamiento de archivos e imágenes del sistema.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Vercel<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Despliegue y hosting del frontend.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">GitHub<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Control de versiones y colaboración.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">4. Estructura del proyecto<\u002Fh5>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">4.1. Organización del repositorio<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El repositorio del proyecto está organizado siguiendo una estructura modular orientada a componentes, cuyo objetivo es facilitar la mantenibilidad, la reutilización de código y la incorporación de nuevas funcionalidades. La mayor parte del código fuente se encuentra centralizada dentro del directorio <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">src<\u002Fcode>, mientras que los archivos de configuración, dependencias y recursos globales se ubican en la raíz del proyecto.<\u002Fp>        <div style=\"background:#0a0d18;border:1px solid #1e2a3a;border-radius:8px;padding:20px 24px;max-width:420px;margin:0 0 18px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.85;color:#94a3b8;\"><div style=\"color:#dde4f0;\">SITI-Proyect/<\u002Fdiv><div>├── <span style=\"color:#4d94ff;\">public/<\u002Fspan><\u002Fdiv><div>├── <span style=\"color:#4d94ff;\">src/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">assets/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">components/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">pages/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">services/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">hooks/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">context/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">utils/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">routes/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#2dd4bf;\">styles/<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;├── <span style=\"color:#f5a623;\">App.jsx<\u002Fspan><\u002Fdiv><div style=\"padding-left:18px;\">│&nbsp;&nbsp;└── <span style=\"color:#f5a623;\">main.jsx<\u002Fspan><\u002Fdiv><div>├── <span style=\"color:#8892a6;\">.env<\u002Fspan><\u002Fdiv><div>├── <span style=\"color:#8892a6;\">.gitignore<\u002Fspan><\u002Fdiv><div>├── <span style=\"color:#8892a6;\">package.json<\u002Fspan><\u002Fdiv><div>├── <span style=\"color:#8892a6;\">package-lock.json<\u002Fspan><\u002Fdiv><div>├── <span style=\"color:#8892a6;\">vite.config.js<\u002Fspan><\u002Fdiv><div>└── <span style=\"color:#8892a6;\">README.md<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">A continuación, se describe la responsabilidad de cada directorio y archivo principal.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">public/<\u002Fstrong> Contiene los recursos estáticos que deben ser servidos directamente por la aplicación sin pasar por el proceso de compilación. Ejemplos: imágenes globales, iconos, archivos de configuración estáticos y favicons.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/<\u002Fstrong> Es el directorio principal del código fuente y concentra la lógica funcional de la aplicación. Toda nueva funcionalidad debe desarrollarse dentro de este directorio.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/assets/<\u002Fstrong> Almacena recursos utilizados por la interfaz de usuario. Ejemplos: imágenes, logotipos, iconos personalizados y archivos multimedia.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/components/<\u002Fstrong> Contiene componentes reutilizables de la interfaz. Estos componentes deben ser independientes, configurables mediante propiedades y reutilizables en diferentes módulos del sistema. Ejemplos: botones, tarjetas, tablas, formularios y gráficos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/pages/<\u002Fstrong> Agrupa las vistas principales de la aplicación. Cada archivo representa una pantalla o módulo funcional. Ejemplos: Inicio, Ventas, Inventario y Turnos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/services/<\u002Fstrong> Centraliza la comunicación con servicios externos y la lógica de acceso a datos. Sus responsabilidades incluyen: consultas a la base de datos, operaciones CRUD, configuración de Firebase e integración con APIs externas. Separar esta lógica evita acoplar el acceso a datos con la interfaz de usuario.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/hooks/<\u002Fstrong> Contiene hooks personalizados que encapsulan lógica reutilizable. Su objetivo es evitar la duplicación de código y simplificar la gestión del estado y los efectos secundarios.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/context/<\u002Fstrong> Gestiona el estado global compartido entre múltiples componentes. Ejemplos: usuario autenticado, turno activo y configuración global.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/utils/<\u002Fstrong> Agrupa funciones auxiliares y utilidades genéricas que pueden reutilizarse en diferentes partes del sistema. Ejemplos: formateo de fechas, validaciones, conversión de datos y funciones matemáticas.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/routes/<\u002Fstrong> Define las rutas de navegación de la aplicación y controla el acceso a cada módulo. Sus responsabilidades incluyen: configuración del enrutamiento, protección de rutas y gestión de permisos.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">src/styles/<\u002Fstrong> Centraliza los estilos globales, variables visuales y configuraciones compartidas de la interfaz.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">App.jsx<\u002Fstrong> Define la estructura principal de la aplicación y orquesta la integración entre rutas, proveedores de contexto y componentes globales.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">main.jsx<\u002Fstrong> Es el punto de entrada de la aplicación. Su responsabilidad es inicializar React y montar el componente principal en el navegador.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">4.2. Archivos de configuración<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">.env<\u002Fstrong> Contiene las variables de entorno necesarias para ejecutar la aplicación. Este archivo no debe incluirse en el repositorio público. Ejemplos: credenciales de Firebase, URLs de servicios y configuraciones específicas del entorno.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">package.json<\u002Fstrong> Define: dependencias del proyecto, scripts de ejecución y metadatos de la aplicación.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">vite.config.js<\u002Fstrong> Contiene la configuración del entorno de construcción y despliegue de Vite.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">.gitignore<\u002Fstrong> Especifica los archivos y directorios que no deben almacenarse en el control de versiones.<\u002Fp>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\"><strong style=\"color:#dde4f0;\">README.md<\u002Fstrong> Proporciona información general sobre el proyecto, instrucciones básicas de instalación y enlaces relevantes.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Convenciones de organización<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Para mantener la consistencia del repositorio, se recomienda seguir las siguientes reglas:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Mantener una única responsabilidad por archivo.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Evitar componentes excesivamente grandes.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Reutilizar componentes antes de crear nuevos.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Centralizar las llamadas a servicios dentro de <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">services/<\u002Fcode>.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Evitar lógica de negocio compleja dentro de los componentes visuales.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Documentar los cambios estructurales importantes.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Utilizar nombres descriptivos y consistentes para archivos y directorios.<\u002Fli><\u002Ful>\n        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">5. Tecnologías y dependencias<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El proyecto utiliza un conjunto de tecnologías orientadas al desarrollo de aplicaciones web modernas, priorizando la rapidez de desarrollo, la escalabilidad y la facilidad de mantenimiento. Las dependencias del sistema se dividen en dos categorías: dependencias críticas, necesarias para el funcionamiento de la aplicación, y dependencias opcionales, utilizadas para mejorar la experiencia de desarrollo, la calidad del código o añadir funcionalidades complementarias.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Dependencias críticas<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Las dependencias críticas son aquellas cuya ausencia impide la ejecución correcta del sistema.<\u002Fp>        <table style=\"width:100%;max-width:820px;border-collapse:collapse;margin:0 0 18px;\"><thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\"><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Tecnología<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Propósito<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">React<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Construcción de la interfaz de usuario basada en componentes reutilizables.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Vite<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Herramienta de compilación y servidor de desarrollo.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">React Router<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Gestión de rutas y navegación entre módulos.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Firebase<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Provisión de servicios backend y persistencia de datos.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Cloud Firestore<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Almacenamiento y sincronización de información.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Firebase Authentication<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Gestión de autenticación y control de acceso.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Firebase Storage<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Almacenamiento de archivos y recursos multimedia.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Biblioteca de gráficos<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Visualización de indicadores y métricas de ventas.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">Biblioteca de estilos<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Diseño visual y consistencia de la interfaz.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Gestión y actualización de dependencias<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Mantener las dependencias actualizadas es fundamental para garantizar la seguridad, compatibilidad y estabilidad del sistema. Sin embargo, las actualizaciones deben realizarse de forma controlada para evitar incompatibilidades entre versiones. Antes de actualizar cualquier paquete, se recomienda seguir el siguiente procedimiento:<\u002Fp>        <ol style=\"font-size:14px;line-height:1.85;color:#94a3b8;padding-left:20px;margin:0 0 14px;max-width:820px;\"><li style=\"margin-bottom:5px;\">Revisar las dependencias instaladas en el archivo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">package.json<\u002Fcode>.<\u002Fli><li style=\"margin-bottom:5px;\">Consultar la documentación oficial de la dependencia.<\u002Fli><li style=\"margin-bottom:5px;\">Verificar posibles cambios incompatibles entre versiones.<\u002Fli><li style=\"margin-bottom:5px;\">Crear una rama específica para la actualización.<\u002Fli><li style=\"margin-bottom:5px;\">Ejecutar las pruebas funcionales del sistema.<\u002Fli><li style=\"margin-bottom:5px;\">Validar el comportamiento de los módulos afectados.<\u002Fli><li style=\"margin-bottom:5px;\">Integrar los cambios únicamente después de confirmar su estabilidad.<\u002Fli><\u002Fol>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">6. Configuración del entorno<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Esta sección describe los pasos necesarios para preparar un entorno local de desarrollo, ejecutar el proyecto y configurar las variables de entorno requeridas para su funcionamiento.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Requisitos previos<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Antes de ejecutar el proyecto, asegúrese de tener instaladas las siguientes herramientas:<\u002Fp>        <table style=\"width:100%;max-width:820px;border-collapse:collapse;margin:0 0 18px;\"><thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\"><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Herramienta<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Versión recomendada<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Propósito<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-weight:500;vertical-align:top;\">Node.js<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#dde4f0;vertical-align:top;\">18.x o superior<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Entorno de ejecución de JavaScript.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-weight:500;vertical-align:top;\">npm<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#dde4f0;vertical-align:top;\">9.x o superior<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Gestión de dependencias y ejecución de scripts.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-weight:500;vertical-align:top;\">Git<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#dde4f0;vertical-align:top;\">Última versión estable<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Control de versiones y clonación del repositorio.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-weight:500;vertical-align:top;\">Navegador web moderno<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#dde4f0;vertical-align:top;\">Última versión estable<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Ejecución y pruebas de la aplicación.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Clonación del repositorio<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Clone el repositorio usando <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">git clone https://github.com/N1ghtlyC0de/SITI-Proyect.git<\u002Fcode>, acceda al directorio del proyecto e instale todas las dependencias definidas en el archivo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">package.json<\u002Fcode>.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Configuración de variables de entorno<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El proyecto utiliza variables de entorno para almacenar información sensible y configuraciones específicas del entorno de ejecución. Antes de iniciar la aplicación, cree un archivo denominado <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">.env<\u002Fcode> en la raíz del proyecto. Estas credenciales pueden obtenerse desde la consola de administración de Firebase asociada al proyecto. Por motivos de seguridad:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;El archivo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">.env<\u002Fcode> no debe almacenarse en el repositorio.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Las credenciales de producción no deben compartirse públicamente.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Cada entorno debe utilizar su propia configuración.<\u002Fli><\u002Ful>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Ejecución del proyecto<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Una vez instaladas las dependencias y configuradas las variables de entorno, inicie el servidor de desarrollo ejecutando <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">npm run dev<\u002Fcode>. Vite iniciará un servidor local y mostrará una dirección similar a <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">http://localhost:XXXX<\u002Fcode>; abra esta dirección en el navegador para acceder a la aplicación. El proyecto define varios scripts de utilidad dentro del archivo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">package.json<\u002Fcode>.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">Verificación del entorno<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Una vez iniciada la aplicación, verifique que:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;La página principal cargue correctamente.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;No existan errores en la consola del navegador.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Las operaciones de lectura y escritura funcionen adecuadamente.<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;La conexión con Firebase se establezca sin inconvenientes.<\u002Fli><\u002Ful>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Si se presentan errores relacionados con la configuración, revise: la versión instalada de Node.js, la existencia del archivo <code style=\"background:#111827;color:#f5a623;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12px;\">.env<\u002Fcode>, los valores de las variables de entorno, la conexión a internet y la configuración del proyecto en Firebase.<\u002Fp>        <h5 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2dd4bf;margin:30px 0 14px;\">7. Modelo de datos<\u002Fh5>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">El modelo de datos del sistema está orientado a la gestión operativa de ventas, inventario y turnos de trabajo. La persistencia se implementa mediante Cloud Firestore, utilizando colecciones y documentos. El siguiente diagrama representa una vista lógica de las entidades y sus relaciones principales.<\u002Fp>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">7.1. Diccionario de datos<\u002Fh6>        <div style=\"display:flex;align-items:center;gap:10px;margin:20px 0 10px;\"><div style=\"width:7px;height:7px;background:#f5a623;border-radius:50%;\"><\u002Fdiv><h6 style=\"font-family:'Syne',sans-serif;font-size:13px;font-weight:7 idth:100%;max-width:820px;border-collapse:collapse;margin:0 0 18px;\"><thead><tr style=\"background:#0d1120;border-bottom:1px solid #253044;\"><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Convención<\u002Fth><th style=\"text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#526077;\">Descripción<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">PK<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Clave primaria del registro.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">FK<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Clave foránea utilizada para relacionar entidades.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">uuid<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Identificador único universal.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">timestamp<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Fecha y hora almacenadas con precisión temporal.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">string<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Cadena de texto.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;background:#0a0d18;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">int<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Número entero.<\u002Ftd><\u002Ftr><tr style=\"border-bottom:1px solid #1e2a3a;\"><td style=\"padding:9px 13px;font-size:13px;color:#f5a623;font-family:'IBM Plex Mono',monospace;vertical-align:top;\">bool<\u002Ftd><td style=\"padding:9px 13px;font-size:13px;color:#94a3b8;line-height:1.5;\">Valor booleano (true o false).<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#dde4f0;margin:18px 0 10px;\">7.1.2. Cardinalidades explícitas<\u002Fh6>        <p style=\"font-size:14px;line-height:1.75;color:#94a3b8;margin:0 0 14px;max-width:820px;\">Algunas cardinalidades son:<\u002Fp>        <ul style=\"font-size:14px;line-height:1.85;color:#94a3b8;list-style:none;padding:0;margin:0 0 14px;max-width:820px;\"><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Un vendedor puede tener muchos turnos (1:N).<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Un vendedor puede registrar muchas ventas (1:N).<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Un turno agrupa múltiples ventas (1:N).<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Una venta contiene múltiples ítems de venta (1:N).<\u002Fli><li style=\"padding-left:18px;text-indent:-18px;margin-bottom:5px;\">•&nbsp;&nbsp;Un producto puede aparecer en múltiples ítems de venta (1:N).<\u002Fli><\u002Ful>        <h6 style=\"font-family:'Syne',sans-serif;font-size:12px;font-weight:700;co
